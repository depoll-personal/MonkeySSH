name: Deploy PR Preview

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to deploy'
        required: true
        type: string
      source-sha:
        description: 'Specific PR commit SHA to deploy (defaults to current PR head)'
        required: false
        default: ''
        type: string
      preview-build-name:
        description: 'Build name associated with the requested deploy artifacts'
        required: false
        default: ''
        type: string
      preview-build-number:
        description: 'Build number associated with the requested deploy artifacts'
        required: false
        default: ''
        type: string
      request-comment-id:
        description: 'Issue comment ID that requested the deploy'
        required: false
        default: ''
        type: string
      request-comment-at:
        description: 'Timestamp of the /deploy comment that requested the deploy'
        required: false
        default: ''
        type: string
      request-comment-user:
        description: 'GitHub login that requested the deploy'
        required: false
        default: ''
        type: string
      request-comment-url:
        description: 'URL of the /deploy comment that requested the deploy'
        required: false
        default: ''
        type: string
      request-preview-comment-url:
        description: 'URL of the sticky preview comment for the requested build'
        required: false
        default: ''
        type: string

concurrency:
  group: deploy-testflight-pr-${{ inputs.pr-number }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  validate-pr:
    name: Validate PR source
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      pr-head-sha: ${{ steps.validate.outputs.pr-head-sha }}
      deploy-sha: ${{ steps.validate.outputs.deploy-sha }}
      pr-title: ${{ steps.validate.outputs.pr-title }}
    steps:
      - name: Validate PR is safe to deploy
        id: validate
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number('${{ inputs.pr-number }}');
            const requestedSourceSha = '${{ inputs.source-sha }}'.trim();
            const {data: pr} = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            if (pr.head.repo?.full_name !== `${owner}/${repo}`) {
              core.setFailed(
                `Refusing to deploy PR #${pull_number} from fork ${pr.head.repo.full_name}. ` +
                `Manual PR preview deploys require a branch in ${owner}/${repo}.`,
              );
              return;
            }

            let deploySha = pr.head.sha;
            if (requestedSourceSha) {
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number,
                per_page: 100,
              });

              if (!commits.some((commit) => commit.sha === requestedSourceSha)) {
                core.setFailed(
                  `Requested source SHA ${requestedSourceSha} is not part of PR #${pull_number}.`,
                );
                return;
              }

              deploySha = requestedSourceSha;
            }

            core.setOutput('pr-head-sha', pr.head.sha);
            core.setOutput('deploy-sha', deploySha);
            core.setOutput('pr-title', pr.title);

  compute-version:
    name: Compute Version
    needs: validate-pr
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.provided-version.outputs.build-name || steps.source-version.outputs.build-name }}
      build-number: ${{ steps.provided-version.outputs.build-number || steps.source-version.outputs.build-number }}
    steps:
      - name: Reuse requested build version
        id: provided-version
        if: inputs.preview-build-name != '' && inputs.preview-build-number != ''
        run: |
          echo "build-name=${{ inputs.preview-build-name }}" >> "$GITHUB_OUTPUT"
          echo "build-number=${{ inputs.preview-build-number }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: inputs.preview-build-name == '' || inputs.preview-build-number == ''
        with:
          persist-credentials: false
          ref: ${{ needs.validate-pr.outputs.deploy-sha }}

      - name: Compute version
        id: source-version
        if: inputs.preview-build-name == '' || inputs.preview-build-number == ''
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER=$(( $(date +%s) / 10 ))

          echo "build-name=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

  finalize-version:
    name: Finalize Deploy Version
    needs: [validate-pr, compute-version]
    if: needs.validate-pr.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      build-name: ${{ steps.finalize.outputs.build-name }}
      build-number: ${{ steps.finalize.outputs.build-number }}
      requested-build-name: ${{ steps.finalize.outputs.requested-build-name }}
      requested-build-number: ${{ steps.finalize.outputs.requested-build-number }}
      rebuild-required: ${{ steps.finalize.outputs.rebuild-required }}
      rebuild-note: ${{ steps.finalize.outputs.rebuild-note }}
      previous-private-deploy-build-number: ${{ steps.finalize.outputs.previous-private-deploy-build-number }}
    steps:
      - name: Keep deploy build number monotonic
        id: finalize
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const requestedBuildName = '${{ needs.compute-version.outputs.build-name }}'.trim();
            const requestedBuildNumber = '${{ needs.compute-version.outputs.build-number }}'.trim();
            const workflowIds = ['deploy-testflight.yml', 'develop.yml'];
            const maxSuccessfulRunsPerWorkflow = 20;
            const artifactPattern = /^(?:android|ios)-private-.+-(\d+)$/;

            let previousPrivateDeployBuildNumber = 0;
            const scannedRunIds = new Set();

            const listWorkflowRuns = async (workflowId) =>
              github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 100,
              });

            const listArtifacts = async (runId) =>
              github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner,
                repo,
                run_id: Number(runId),
                per_page: 100,
              });

            for (const workflowId of workflowIds) {
              const runs = await listWorkflowRuns(workflowId);
              const successfulRuns = runs
                .filter((run) => run.status === 'completed' && run.conclusion === 'success')
                .slice(0, maxSuccessfulRunsPerWorkflow);

              for (const run of successfulRuns) {
                if (scannedRunIds.has(run.id)) {
                  continue;
                }
                scannedRunIds.add(run.id);

                const artifacts = await listArtifacts(run.id);
                const runBuildNumbers = artifacts
                  .map((artifact) => artifact.name.match(artifactPattern)?.[1] ?? '')
                  .filter(Boolean)
                  .map((value) => Number(value))
                  .filter((value) => Number.isFinite(value));

                if (runBuildNumbers.length === 0) {
                  continue;
                }

                previousPrivateDeployBuildNumber = Math.max(
                  previousPrivateDeployBuildNumber,
                  ...runBuildNumbers,
                );
              }
            }

            let buildNumber = requestedBuildNumber;
            let rebuildRequired = 'false';
            let rebuildNote = '';

            if (
              requestedBuildNumber &&
              previousPrivateDeployBuildNumber > 0 &&
              Number(requestedBuildNumber) <= previousPrivateDeployBuildNumber
            ) {
              const freshBuildNumber = Math.floor(Date.now() / 1000 / 10);
              buildNumber = String(
                Math.max(freshBuildNumber, previousPrivateDeployBuildNumber + 1),
              );
              rebuildRequired = 'true';
              rebuildNote =
                `> Rebuild triggered because requested preview build \`${requestedBuildNumber}\` ` +
                `was not newer than the highest recent private deploy build ` +
                `\`${previousPrivateDeployBuildNumber}\`. This run is using freshly built ` +
                `deploy artifacts with build \`${buildNumber}\` instead of reusing preview artifacts.`;
              core.notice(
                `Requested preview build ${requestedBuildNumber} is not newer than the highest ` +
                  `recent ` +
                  `private deploy build ${previousPrivateDeployBuildNumber}; using fresh ` +
                  `deploy build ${buildNumber}.`,
              );
            }

            core.setOutput('build-name', requestedBuildName);
            core.setOutput('build-number', buildNumber);
            core.setOutput('requested-build-name', requestedBuildName);
            core.setOutput('requested-build-number', requestedBuildNumber);
            core.setOutput('rebuild-required', rebuildRequired);
            core.setOutput('rebuild-note', rebuildNote);
            core.setOutput(
              'previous-private-deploy-build-number',
              String(previousPrivateDeployBuildNumber),
            );

  resolve-preview-artifacts:
    name: Resolve Preview Artifacts
    needs: [validate-pr, finalize-version]
    if: needs.validate-pr.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      reuse-artifacts: ${{ steps.resolve.outputs.reuse-artifacts }}
      preview-run-id: ${{ steps.resolve.outputs.preview-run-id }}
    steps:
      - name: Find or start reusable artifact build
        id: resolve
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deploySha = '${{ needs.validate-pr.outputs.deploy-sha }}';
            const prNumber = '${{ inputs.pr-number }}';
            const buildName = '${{ needs.finalize-version.outputs.build-name }}';
            const buildNumber = '${{ needs.finalize-version.outputs.build-number }}';
            const rebuildRequired =
              '${{ needs.finalize-version.outputs.rebuild-required }}' === 'true';
            const workflowId = 'preview.yml';
            const requiredArtifactNames = [
              `android-unsigned-private-${buildName}-${buildNumber}`,
              `ios-unsigned-private-${buildName}-${buildNumber}`,
            ];
            const waitStatuses = new Set(['queued', 'in_progress', 'requested', 'waiting']);
            const maxWaitAttempts = 40;
            const waitDelayMs = 30_000;

            const setOutputs = ({
              reuseArtifacts = 'false',
              previewRunId = '',
            }) => {
              core.setOutput('reuse-artifacts', reuseArtifacts);
              core.setOutput('preview-run-id', previewRunId);
            };

            if (rebuildRequired) {
              core.notice(
                `Skipping preview artifact reuse for ${deploySha} because deploy build ` +
                  `${buildNumber} was regenerated to stay ahead of prior private deploys.`,
              );
              setOutputs({});
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const listRuns = async () =>
              github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: workflowId,
                event: 'pull_request',
                per_page: 100,
              });

            const listArtifacts = async (runId) =>
              github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner,
                repo,
                run_id: Number(runId),
                per_page: 100,
              });

            const getWorkflowRun = async (runId) =>
              (
                await github.rest.actions.getWorkflowRun({
                  owner,
                  repo,
                  run_id: Number(runId),
                })
              ).data;

            const findRunForSha = async () => {
              const runs = await listRuns();
              return runs.find(
                (run) =>
                  run.head_sha === deploySha &&
                  run.event === 'pull_request' &&
                  run.pull_requests?.some((pullRequest) => String(pullRequest.number) === prNumber),
              ) ?? null;
            };

            const awaitCompletion = async (initialRun) => {
              let currentRun = initialRun;
              for (let attempt = 0; attempt < maxWaitAttempts; attempt += 1) {
                if (!waitStatuses.has(currentRun.status)) {
                  return currentRun;
                }

                core.notice(
                  `Waiting for preview workflow run ${currentRun.id} to finish building reusable artifacts for ${deploySha}.`,
                );
                await sleep(waitDelayMs);
                currentRun = await getWorkflowRun(currentRun.id);
              }

              return currentRun;
            };

            const prepareRun = await findRunForSha();
            if (!prepareRun) {
              core.notice(
                `No preview workflow run found for ${deploySha}; deploy will build fresh artifacts.`,
              );
              setOutputs({});
              return;
            }

            const finishedRun = await awaitCompletion(prepareRun);
            if (finishedRun.status !== 'completed') {
              core.notice(
                `Preview workflow run ${finishedRun.id} did not complete in time; deploy will build fresh artifacts.`,
              );
              setOutputs({});
              return;
            }

            if (finishedRun.conclusion !== 'success') {
              core.notice(
                `Preview workflow run ${finishedRun.id} concluded with ${finishedRun.conclusion}; deploy will build fresh artifacts.`,
              );
              setOutputs({});
              return;
            }

            const artifacts = await listArtifacts(finishedRun.id);
            const availableArtifactNames = new Set(
              artifacts.filter((artifact) => !artifact.expired).map((artifact) => artifact.name),
            );
            const missingArtifactNames = requiredArtifactNames.filter(
              (artifactName) => !availableArtifactNames.has(artifactName),
            );

            if (missingArtifactNames.length > 0) {
              core.notice(
                 `Preview workflow run ${finishedRun.id} is missing reusable artifacts (${missingArtifactNames.join(', ')}); deploy will build fresh artifacts.`,
               );
              setOutputs({});
              return;
            }

            setOutputs({
              reuseArtifacts: 'true',
              previewRunId: String(finishedRun.id),
            });

  comment-start:
    name: Update PR deploy comment (start)
    needs: [validate-pr, finalize-version, resolve-preview-artifacts]
    if: needs.validate-pr.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark deploy as running
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number('${{ inputs.pr-number }}');
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const previewMarker = '<!-- Sticky Pull Request Commentpreview-build -->';
            const statusMarker = '<!-- preview-deploy-status -->';
            const noPreviewCommentUrl = '__NO_PREVIEW_COMMENT__';

            const readMeta = (body, key) => {
              const pattern = new RegExp(`<!-- ${key}:(.*?) -->`);
              return body.match(pattern)?.[1] ?? '';
            };

            const resolvePreviewCommentUrl = ({comments, deploySha, fallbackUrl}) => {
              const latestPreviewComment = [...comments].reverse().find((comment) => {
                if (!comment.body?.includes(previewMarker)) {
                  return false;
                }

                if (!deploySha) {
                  return true;
                }

                return readMeta(comment.body, 'preview-build-source-sha') === deploySha;
              });

              return latestPreviewComment?.html_url ?? fallbackUrl;
            };

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.body?.includes(statusMarker),
            );
            const existingBody = existing?.body ?? '';

            const requestedBy =
              '${{ inputs.request-comment-user }}' ||
              readMeta(existingBody, 'preview-deploy-requested-by') ||
              '${{ github.actor }}';
            const requestedAt =
              '${{ inputs.request-comment-at }}' ||
              readMeta(existingBody, 'preview-deploy-requested-at');
            const requestCommentId =
              '${{ inputs.request-comment-id }}' ||
              readMeta(existingBody, 'preview-deploy-last-command-comment-id');
            const requestCommentUrl =
              '${{ inputs.request-comment-url }}' ||
              readMeta(existingBody, 'preview-deploy-request-comment-url');
            const requestedPreviewCommentUrl =
              '${{ inputs.request-preview-comment-url }}' === noPreviewCommentUrl
                ? ''
                : '${{ inputs.request-preview-comment-url }}' ||
                  readMeta(existingBody, 'preview-deploy-preview-comment-url');
            const deploySha =
              '${{ needs.validate-pr.outputs.deploy-sha }}' ||
              readMeta(existingBody, 'preview-deploy-source-sha');
            const previewCommentUrl = resolvePreviewCommentUrl({
              comments,
              deploySha,
              fallbackUrl: requestedPreviewCommentUrl,
            });
            const requestDetails = requestCommentId
              ? `@${requestedBy} via \`/deploy\` comment`
              : `@${requestedBy} via workflow dispatch`;
            const rebuildRequired =
              '${{ needs.finalize-version.outputs.rebuild-required }}' === 'true';
            const rebuildNote =
              ${{ toJSON(needs.finalize-version.outputs.rebuild-note) }};
            const artifactDetails =
              rebuildRequired
                ? `| **Artifacts** | Rebuilding deploy artifacts in this run because requested preview build \`${{ needs.finalize-version.outputs.requested-build-number }}\` is not newer than the highest recent private deploy build \`${{ needs.finalize-version.outputs.previous-private-deploy-build-number }}\` |`
                : '${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts }}' === 'true'
                ? `| **Artifacts** | Reusing unsigned preview intermediates from run #${{ needs.resolve-preview-artifacts.outputs.preview-run-id }} |`
                : '| **Artifacts** | Preview intermediates unavailable, so this run is building deploy artifacts from source |';

            const body = [
              '## 🚀 Preview Deploy',
              '',
              '| | Details |',
              '|---|---|',
              '| **Status** | 🔒 Lock acquired — deploying |',
              `| **Requested by** | ${requestDetails} |`,
              `| **Preview SHA** | \`${deploySha}\` |`,
              `| **Version** | \`${{ needs.finalize-version.outputs.build-name }}\` |`,
              `| **Build** | \`${{ needs.finalize-version.outputs.build-number }}\` |`,
              artifactDetails,
              requestCommentUrl
                ? `| **Request** | [View /deploy comment](${requestCommentUrl}) |`
                : null,
              previewCommentUrl
                ? `| **Preview Comment** | [View preview artifacts](${previewCommentUrl}) |`
                : null,
              requestedAt ? `| **Requested at** | ${requestedAt} |` : null,
              `| **Workflow** | [View deploy run](${runUrl}) |`,
              '',
              rebuildNote,
              '> Duplicate requests stay locked out while this deploy is queued or running.',
              statusMarker,
              '<!-- preview-deploy-state:in_progress -->',
              `<!-- preview-deploy-last-command-comment-id:${requestCommentId} -->`,
              `<!-- preview-deploy-requested-by:${requestedBy} -->`,
              `<!-- preview-deploy-requested-at:${requestedAt} -->`,
              `<!-- preview-deploy-request-comment-url:${requestCommentUrl} -->`,
              `<!-- preview-deploy-preview-comment-url:${previewCommentUrl} -->`,
              `<!-- preview-deploy-source-sha:${deploySha} -->`,
              `<!-- preview-deploy-build-name:${{ needs.finalize-version.outputs.build-name }} -->`,
              `<!-- preview-deploy-build-number:${{ needs.finalize-version.outputs.build-number }} -->`,
              `<!-- preview-deploy-requested-build-number:${{ needs.finalize-version.outputs.requested-build-number }} -->`,
              `<!-- preview-deploy-rebuild-required:${{ needs.finalize-version.outputs.rebuild-required }} -->`,
            ]
              .filter(Boolean)
              .join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

  deploy:
    name: Deploy to TestFlight & Play Internal
    needs: [validate-pr, finalize-version, resolve-preview-artifacts]
    uses: ./.github/workflows/build-deploy.yml
    with:
      build-name: ${{ needs.finalize-version.outputs.build-name }}
      build-number: ${{ needs.finalize-version.outputs.build-number }}
      pr-number: ${{ inputs.pr-number }}
      pr-title: ${{ needs.validate-pr.outputs.pr-title }}
      flavor: private
      source-ref: ${{ needs.validate-pr.outputs.deploy-sha }}
      deploy-ios-to: testflight
      deploy-android-to: internal
      android-reuse-run-id: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' && needs.resolve-preview-artifacts.outputs.preview-run-id || '' }}
      android-reuse-aab-artifact-name: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' && format('android-unsigned-{0}-{1}-{2}', 'private', needs.finalize-version.outputs.build-name, needs.finalize-version.outputs.build-number) || '' }}
      android-reuse-aab-is-unsigned: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' }}
      android-reuse-source-sha: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' && needs.validate-pr.outputs.deploy-sha || '' }}
      ios-reuse-run-id: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' && needs.resolve-preview-artifacts.outputs.preview-run-id || '' }}
      ios-reuse-ipa-artifact-name: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' && format('ios-unsigned-{0}-{1}-{2}', 'private', needs.finalize-version.outputs.build-name, needs.finalize-version.outputs.build-number) || '' }}
      ios-reuse-ipa-is-unsigned: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' }}
      ios-reuse-source-sha: ${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts == 'true' && needs.validate-pr.outputs.deploy-sha || '' }}
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}

  verify-pr-source:
    name: Verify PR source ref
    needs: [validate-pr, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Ensure deployed mobile builds used requested preview SHA
        env:
          EXPECTED_SHA: ${{ needs.validate-pr.outputs.deploy-sha }}
          ACTUAL_IOS_SHA: ${{ needs.deploy.outputs.ios-source-sha }}
          ACTUAL_ANDROID_SHA: ${{ needs.deploy.outputs.android-source-sha }}
        run: |
          if [ -z "$ACTUAL_IOS_SHA" ]; then
            echo "Missing iOS source SHA output from build-deploy workflow."
            echo "Use the workflow definition from a ref that includes source-ref + ios-source-sha support."
            exit 1
          fi

          if [ -z "$ACTUAL_ANDROID_SHA" ]; then
            echo "Missing Android source SHA output from build-deploy workflow."
            echo "Use the workflow definition from a ref that includes source-ref + android-source-sha support."
            exit 1
          fi

          if [ "$EXPECTED_SHA" != "$ACTUAL_ANDROID_SHA" ]; then
            echo "Expected deploy SHA:      $EXPECTED_SHA"
            echo "Actual Android deploy SHA: $ACTUAL_ANDROID_SHA"
            echo "Play internal deploy did not build from the requested preview SHA for PR #${{ inputs.pr-number }}."
            exit 1
          fi

          if [ "$EXPECTED_SHA" != "$ACTUAL_IOS_SHA" ]; then
            echo "Expected deploy SHA: $EXPECTED_SHA"
            echo "Actual iOS deploy SHA: $ACTUAL_IOS_SHA"
            echo "TestFlight deploy did not build from the requested preview SHA for PR #${{ inputs.pr-number }}."
            exit 1
          fi

          echo "Verified Android and iOS deploy source SHA matches requested preview SHA: $EXPECTED_SHA"

  comment-finish:
    name: Update PR deploy comment (finish)
    needs:
        [
          validate-pr,
          finalize-version,
          resolve-preview-artifacts,
          comment-start,
          deploy,
          verify-pr-source,
        ]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Mark deploy as complete
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number('${{ inputs.pr-number }}');
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const previewMarker = '<!-- Sticky Pull Request Commentpreview-build -->';
            const statusMarker = '<!-- preview-deploy-status -->';
            const noPreviewCommentUrl = '__NO_PREVIEW_COMMENT__';

            const readMeta = (body, key) => {
              const pattern = new RegExp(`<!-- ${key}:(.*?) -->`);
              return body.match(pattern)?.[1] ?? '';
            };

            const resolvePreviewCommentUrl = ({comments, deploySha, fallbackUrl}) => {
              const latestPreviewComment = [...comments].reverse().find((comment) => {
                if (!comment.body?.includes(previewMarker)) {
                  return false;
                }

                if (!deploySha) {
                  return true;
                }

                return readMeta(comment.body, 'preview-build-source-sha') === deploySha;
              });

              return latestPreviewComment?.html_url ?? fallbackUrl;
            };

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.body?.includes(statusMarker),
            );
            const existingBody = existing?.body ?? '';

            const requestedBy =
              '${{ inputs.request-comment-user }}' ||
              readMeta(existingBody, 'preview-deploy-requested-by') ||
              '${{ github.actor }}';
            const requestedAt =
              '${{ inputs.request-comment-at }}' ||
              readMeta(existingBody, 'preview-deploy-requested-at');
            const requestCommentId =
              '${{ inputs.request-comment-id }}' ||
              readMeta(existingBody, 'preview-deploy-last-command-comment-id');
            const requestCommentUrl =
              '${{ inputs.request-comment-url }}' ||
              readMeta(existingBody, 'preview-deploy-request-comment-url');
            const requestedPreviewCommentUrl =
              '${{ inputs.request-preview-comment-url }}' === noPreviewCommentUrl
                ? ''
                : '${{ inputs.request-preview-comment-url }}' ||
                  readMeta(existingBody, 'preview-deploy-preview-comment-url');
            const deploySha =
              '${{ needs.validate-pr.outputs.deploy-sha }}' ||
              readMeta(existingBody, 'preview-deploy-source-sha') ||
              '${{ inputs.source-sha }}';
            const previewCommentUrl = resolvePreviewCommentUrl({
              comments,
              deploySha,
              fallbackUrl: requestedPreviewCommentUrl,
            });
            const requestDetails = requestCommentId
              ? `@${requestedBy} via \`/deploy\` comment`
              : `@${requestedBy} via workflow dispatch`;
            const rebuildRequired =
              '${{ needs.finalize-version.outputs.rebuild-required }}' === 'true';
            const rebuildNote =
              ${{ toJSON(needs.finalize-version.outputs.rebuild-note) }};
            const artifactDetails =
              rebuildRequired
                ? `| **Artifacts** | Built fresh deploy artifacts in this run because requested preview build \`${{ needs.finalize-version.outputs.requested-build-number }}\` was not newer than the highest recent private deploy build \`${{ needs.finalize-version.outputs.previous-private-deploy-build-number }}\` |`
                : '${{ needs.resolve-preview-artifacts.outputs.reuse-artifacts }}' === 'true'
                ? `| **Artifacts** | Reused unsigned preview intermediates from run #${{ needs.resolve-preview-artifacts.outputs.preview-run-id }} |`
                : '| **Artifacts** | Built fresh deploy artifacts in this run because matching preview intermediates were unavailable |';

            const replaceEyesReactionWithRocket = async () => {
              if (!requestCommentId) {
                return;
              }

              const commentId = Number(requestCommentId);
              const reactions = await github.paginate(
                'GET /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions',
                {
                  owner,
                  repo,
                  comment_id: commentId,
                  per_page: 100,
                  headers: {accept: 'application/vnd.github+json'},
                },
              );
              const botEyesReactions = reactions.filter(
                (reaction) =>
                  reaction.content === 'eyes' && reaction.user?.login === 'github-actions[bot]',
              );

              for (const reaction of botEyesReactions) {
                await github.request(
                  'DELETE /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions/{reaction_id}',
                  {
                    owner,
                    repo,
                    comment_id: commentId,
                    reaction_id: reaction.id,
                    headers: {accept: 'application/vnd.github+json'},
                  },
                );
              }

              if (
                reactions.some(
                  (reaction) =>
                    reaction.content === 'rocket' && reaction.user?.login === 'github-actions[bot]',
                )
              ) {
                return;
              }

              await github.request(
                'POST /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions',
                {
                  owner,
                  repo,
                  comment_id: commentId,
                  content: 'rocket',
                  headers: {accept: 'application/vnd.github+json'},
                },
              );
            };

            const validationResult = '${{ needs.validate-pr.result }}';
            const deployResult = '${{ needs.deploy.result }}';
            const verifyResult = '${{ needs.verify-pr-source.result }}';

            let state = 'failed';
            let status = '❌ Deploy failed';

            if (
              validationResult === 'success' &&
              deployResult === 'success' &&
              verifyResult === 'success'
            ) {
              state = 'success';
              status = '✅ Deployed to TestFlight & Play internal';
            } else if (
              validationResult === 'cancelled' ||
              deployResult === 'cancelled' ||
              verifyResult === 'cancelled'
            ) {
              state = 'cancelled';
              status = '⛔ Deploy cancelled';
            } else if (validationResult !== 'success') {
              status = '❌ PR validation failed';
            } else if (deployResult !== 'success') {
              status = '❌ Build or store deploy failed';
            } else if (verifyResult !== 'success') {
              status = '❌ Deployed artifacts did not match the requested preview SHA';
            }

            const body = [
              '## 🚀 Preview Deploy',
              '',
              '| | Details |',
              '|---|---|',
              `| **Status** | ${status} |`,
              `| **Requested by** | ${requestDetails} |`,
              deploySha ? `| **Preview SHA** | \`${deploySha}\` |` : null,
              '${{ needs.finalize-version.outputs.build-name }}'
                ? `| **Version** | \`${{ needs.finalize-version.outputs.build-name }}\` |`
                : null,
              '${{ needs.finalize-version.outputs.build-number }}'
                ? `| **Build** | \`${{ needs.finalize-version.outputs.build-number }}\` |`
                : null,
              artifactDetails,
              requestCommentUrl
                ? `| **Request** | [View /deploy comment](${requestCommentUrl}) |`
                : null,
              previewCommentUrl
                ? `| **Preview Comment** | [View preview artifacts](${previewCommentUrl}) |`
                : null,
              requestedAt ? `| **Requested at** | ${requestedAt} |` : null,
              `| **Workflow** | [View deploy run](${runUrl}) |`,
              '',
              rebuildNote,
              '> Add a new `/deploy` comment if you want to request another deploy.',
              statusMarker,
              `<!-- preview-deploy-state:${state} -->`,
              `<!-- preview-deploy-last-command-comment-id:${requestCommentId} -->`,
              `<!-- preview-deploy-requested-by:${requestedBy} -->`,
              `<!-- preview-deploy-requested-at:${requestedAt} -->`,
              `<!-- preview-deploy-request-comment-url:${requestCommentUrl} -->`,
              `<!-- preview-deploy-preview-comment-url:${previewCommentUrl} -->`,
              `<!-- preview-deploy-source-sha:${deploySha} -->`,
              `<!-- preview-deploy-build-name:${{ needs.finalize-version.outputs.build-name }} -->`,
              `<!-- preview-deploy-build-number:${{ needs.finalize-version.outputs.build-number }} -->`,
              `<!-- preview-deploy-requested-build-number:${{ needs.finalize-version.outputs.requested-build-number }} -->`,
              `<!-- preview-deploy-rebuild-required:${{ needs.finalize-version.outputs.rebuild-required }} -->`,
            ]
              .filter(Boolean)
              .join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

            try {
              await replaceEyesReactionWithRocket();
            } catch (error) {
              core.warning(`Failed to update deploy reaction: ${String(error)}`);
            }
