name: Sync Store Metadata

on:
  push:
    branches: [main]
    paths:
      - 'assets/icons/**'
      - 'android/fastlane/metadata-*/**'
      - 'ios/fastlane/metadata-*/**'
      - 'ios/fastlane/screenshots/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to sync'
        required: true
        type: choice
        options:
          - both
          - ios
          - android
      app:
        description: 'Which app listing to sync'
        required: true
        type: choice
        options:
          - both
          - private
          - production

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Metadata
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: filter
        name: Detect platform metadata changes
        shell: bash
        run: |
          ios=false
          android=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.platform }}" in
              both)
                ios=true
                android=true
                ;;
              ios)
                ios=true
                ;;
              android)
                android=true
                ;;
            esac
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
            while IFS= read -r changed_path; do
              case "$changed_path" in
                assets/icons/*|ios/fastlane/metadata-*|ios/fastlane/metadata-*/*|ios/fastlane/screenshots/*)
                  ios=true
                  ;;
              esac
              case "$changed_path" in
                assets/icons/*|android/fastlane/metadata-*|android/fastlane/metadata-*/*)
                  android=true
                  ;;
              esac
            done <<< "$changed_files"
          fi

          echo "ios=$ios" >> "$GITHUB_OUTPUT"
          echo "android=$android" >> "$GITHUB_OUTPUT"

  validate-screenshots:
    name: Validate Store Screenshots
    needs: changes
    if: needs.changes.outputs.ios == 'true' || needs.changes.outputs.android == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install screenshot validation dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --quiet --upgrade pip
          .venv/bin/python -m pip install --quiet Pillow

      - name: Validate screenshots with OCR
        shell: bash
        run: |
          if [[ "${{ needs.changes.outputs.ios }}" == "true" && "${{ needs.changes.outputs.android }}" == "true" ]]; then
            platform=both
          elif [[ "${{ needs.changes.outputs.ios }}" == "true" ]]; then
            platform=ios
          else
            platform=android
          fi
          .venv/bin/python scripts/validate_store_screenshots.py "$platform"

  sync-ios:
    name: Sync iOS Metadata
    needs: [changes, validate-screenshots]
    if: needs.changes.outputs.ios == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Validate App Store metadata
        run: python3 scripts/validate_app_store_metadata.py ${{ github.event_name == 'push' && 'both' || inputs.app }}

      - name: Sync private app metadata
        if: github.event_name == 'push' || inputs.app == 'both' || inputs.app == 'private'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd ios
          bundle exec fastlane sync_metadata app_identifier:xyz.depollsoft.monkeyssh.private

      - name: Sync production app metadata
        if: github.event_name == 'push' || inputs.app == 'both' || inputs.app == 'production'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd ios
          bundle exec fastlane sync_metadata app_identifier:xyz.depollsoft.monkeyssh

  sync-android:
    name: Sync Android Metadata
    needs: [changes, validate-screenshots]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Refresh Play Store icon metadata
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --quiet --upgrade pip
          .venv/bin/python -m pip install --quiet Pillow
          .venv/bin/python scripts/sync_play_store_icons.py

      - name: Validate Play Store metadata
        run: python3 scripts/validate_play_store_metadata.py ${{ github.event_name == 'push' && 'both' || inputs.app }}

      - name: Sync private app metadata
        if: github.event_name == 'push' || inputs.app == 'both' || inputs.app == 'private'
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd android
          bundle exec fastlane sync_metadata package_name:xyz.depollsoft.monkeyssh.private

      - name: Sync production app metadata
        if: github.event_name == 'push' || inputs.app == 'both' || inputs.app == 'production'
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd android
          bundle exec fastlane sync_metadata package_name:xyz.depollsoft.monkeyssh
