name: Build & Deploy

on:
  workflow_call:
    inputs:
      build-name:
        required: true
        type: string
        description: 'Version name (e.g., 0.1.0-pr.42 or 1.2.0)'
      build-number:
        required: true
        type: string
        description: 'Build number (integer, monotonically increasing)'
      build-codename:
        required: false
        type: string
        default: ''
        description: 'Monkey codename for the current major version'
      pr-number:
        required: false
        type: string
        default: ''
        description: 'Pull request number for preview-derived builds'
      pr-title:
        required: false
        type: string
        default: ''
        description: 'Pull request title for preview-derived builds'
      flavor:
        required: true
        type: string
        description: 'Flutter flavor (private or production)'
      source-ref:
        required: false
        type: string
        default: ''
        description: 'Git ref to build (branch, tag, or refs/pull/*/head)'
      deploy-ios-to:
        required: false
        type: string
        default: 'none'
        description: 'iOS deploy target: testflight, appstore, or none'
      deploy-android-to:
        required: false
        type: string
        default: 'none'
        description: 'Android deploy target: internal, production, or none'
      build-android:
        required: false
        type: boolean
        default: true
        description: 'Whether to run the Android build job'
      build-ios:
        required: false
        type: boolean
        default: true
        description: 'Whether to run the iOS build job'
      build-android-unsigned-aab:
        required: false
        type: boolean
        default: false
        description: 'Whether to build an unsigned Android release bundle artifact'
      build-ios-unsigned-ipa:
        required: false
        type: boolean
        default: false
        description: 'Whether to package an unsigned iOS IPA artifact'
      run-android-deploy:
        required: false
        type: boolean
        default: true
        description: 'Whether to upload Android artifacts to Play when deploy-android-to != none'
      run-ios-deploy:
        required: false
        type: boolean
        default: true
        description: 'Whether to upload iOS artifacts to App Store Connect when deploy-ios-to != none'
      update-pr-deploy-comment:
        required: false
        type: boolean
        default: false
        description: 'Whether to update the preview deploy PR comment as each platform finishes'
      android-reuse-run-id:
        required: false
        type: string
        default: ''
        description: 'Workflow run ID containing reusable Android artifacts'
      android-reuse-aab-artifact-name:
        required: false
        type: string
        default: ''
        description: 'Artifact name for a reusable Android AAB'
      android-reuse-apk-artifact-name:
        required: false
        type: string
        default: ''
        description: 'Artifact name for a reusable Android APK'
      android-reuse-aab-is-unsigned:
        required: false
        type: boolean
        default: false
        description: 'Whether the reusable Android AAB must be signed in this workflow'
      android-reuse-source-sha:
        required: false
        type: string
        default: ''
        description: 'Source SHA associated with the reusable Android artifacts'
      ios-reuse-run-id:
        required: false
        type: string
        default: ''
        description: 'Workflow run ID containing a reusable iOS IPA'
      ios-reuse-ipa-artifact-name:
        required: false
        type: string
        default: ''
        description: 'Artifact name for a reusable iOS IPA'
      ios-reuse-ipa-is-unsigned:
        required: false
        type: boolean
        default: false
        description: 'Whether the reusable iOS IPA must be signed in this workflow'
      ios-reuse-source-sha:
        required: false
        type: string
        default: ''
        description: 'Source SHA associated with the reusable iOS IPA'
      sync-metadata:
        required: false
        type: boolean
        default: false
        description: 'Whether to sync store metadata alongside the deploy'
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
      ANDROID_STORE_PASSWORD:
        required: false
      PLAY_STORE_SERVICE_ACCOUNT_JSON:
        required: false
      MATCH_GIT_URL:
        required: false
      MATCH_PASSWORD:
        required: false
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        required: false
      APP_STORE_CONNECT_API_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_API_KEY_CONTENT:
        required: false
    outputs:
      apk-artifact-id:
        description: 'Artifact ID of the uploaded APK'
        value: ${{ jobs.build-android.outputs.apk-artifact-id }}
      android-source-sha:
        description: 'Git SHA used for Android build checkout'
        value: ${{ jobs.build-android.outputs.source-sha }}
      ios-source-sha:
        description: 'Git SHA used for iOS build checkout'
        value: ${{ jobs.build-ios.outputs.source-sha }}
      android-deploy-status:
        description: 'Final Android deploy status summary for preview deploy comments'
        value: ${{ jobs.deploy-status-summary.outputs.android-deploy-status }}
      ios-deploy-status:
        description: 'Final iOS deploy status summary for preview deploy comments'
        value: ${{ jobs.deploy-status-summary.outputs.ios-deploy-status }}

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-android:
    name: Build & Deploy Android (${{ inputs.flavor }})
    if: inputs.build-android
    runs-on: ubicloud-standard-4
    env:
      FLUTTY_PR_NUMBER: ${{ inputs.pr-number }}
      FLUTTY_PR_TITLE: ${{ inputs.pr-title }}
    outputs:
      apk-artifact-id: ${{ steps.upload-apk.outputs.artifact-id }}
      source-sha: ${{ steps.resolved-source-sha.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 2

      - name: Capture source SHA
        id: source-sha
        env:
          REQUESTED_SOURCE_REF: ${{ inputs.source-ref }}
          REUSED_SOURCE_SHA: ${{ inputs.android-reuse-source-sha }}
        run: |
          if [ -n "$REUSED_SOURCE_SHA" ]; then
            echo "value=$REUSED_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          elif echo "$REQUESTED_SOURCE_REF" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "value=$REQUESTED_SOURCE_REF" >> "$GITHUB_OUTPUT"
          elif [ -n "$REQUESTED_SOURCE_REF" ]; then
            git fetch --no-tags --depth=1 origin -- "$REQUESTED_SOURCE_REF"
            echo "value=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve source SHA
        id: resolved-source-sha
        env:
          REUSED_SOURCE_SHA: ${{ inputs.android-reuse-source-sha }}
          CHECKED_OUT_SOURCE_SHA: ${{ steps.source-sha.outputs.value }}
        run: |
          if [ -n "$REUSED_SOURCE_SHA" ]; then
            echo "value=$REUSED_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "value=$CHECKED_OUT_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout requested source ref for Android build
        if: inputs.source-ref != '' && inputs.android-reuse-aab-artifact-name == ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ steps.source-sha.outputs.value }}
          fetch-depth: 1

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        if: inputs.android-reuse-aab-artifact-name == '' || (inputs.deploy-android-to != 'none' && inputs.android-reuse-aab-is-unsigned)
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        if: inputs.android-reuse-aab-artifact-name == ''
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/build.gradle*', 'android/app/build.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        if: inputs.android-reuse-aab-artifact-name == ''
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        if: inputs.android-reuse-aab-artifact-name == ''
        run: flutter pub get

      - name: Validate Android signing secrets
        if: inputs.deploy-android-to != 'none' && (inputs.android-reuse-aab-artifact-name == '' || inputs.android-reuse-aab-is-unsigned)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_KEYSTORE_BASE64 is required for Android release signing."
            exit 1
          fi
          if [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_KEY_ALIAS is required for Android release signing."
            exit 1
          fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_KEY_PASSWORD is required for Android release signing."
            exit 1
          fi
          if [ -z "$ANDROID_STORE_PASSWORD" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_STORE_PASSWORD is required for Android release signing."
            exit 1
          fi

      - name: Decode keystore
        if: inputs.deploy-android-to != 'none' && (inputs.android-reuse-aab-artifact-name == '' || inputs.android-reuse-aab-is-unsigned)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          umask 077
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        if: inputs.deploy-android-to != 'none' && inputs.android-reuse-aab-artifact-name == ''
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          umask 077
          cat > android/app/key.properties << EOF_KEY_PROPERTIES
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF_KEY_PROPERTIES

      - name: Build signed AAB
        if: inputs.deploy-android-to != 'none' && inputs.android-reuse-aab-artifact-name == ''
        run: |
          flutter build appbundle \
            --flavor ${{ inputs.flavor }} \
            --release \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Build unsigned AAB
        if: inputs.build-android-unsigned-aab && inputs.android-reuse-aab-artifact-name == '' && inputs.deploy-android-to == 'none'
        env:
          FLUTTY_ALLOW_UNSIGNED_RELEASE: 'true'
        run: |
          flutter build appbundle \
            --flavor ${{ inputs.flavor }} \
            --release \
            --no-tree-shake-icons \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Build debug APK
        if: inputs.deploy-android-to == 'none'
        run: |
          flutter build apk \
            --flavor ${{ inputs.flavor }} \
            --debug \
            --no-tree-shake-icons \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Download reusable AAB artifact
        if: inputs.android-reuse-aab-artifact-name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.android-reuse-run-id }}
          name: ${{ inputs.android-reuse-aab-artifact-name }}
          path: build/app/outputs/bundle/${{ inputs.flavor }}Release

      - name: Download reusable APK artifact
        if: inputs.android-reuse-apk-artifact-name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.android-reuse-run-id }}
          name: ${{ inputs.android-reuse-apk-artifact-name }}
          path: build/app/outputs/flutter-apk

      - name: Sign reusable unsigned AAB
        if: inputs.deploy-android-to != 'none' && inputs.android-reuse-aab-artifact-name != '' && inputs.android-reuse-aab-is-unsigned
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          AAB_PATH=$(find build/app/outputs/bundle/${{ inputs.flavor }}Release -maxdepth 1 -name '*.aab' -print -quit)
          if [ -z "$AAB_PATH" ]; then
            echo "Expected a reusable unsigned AAB artifact, but none was downloaded."
            exit 1
          fi

          SIGNED_AAB_PATH="$(dirname "$AAB_PATH")/signed-$(basename "$AAB_PATH")"
          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore android/app/upload-keystore.jks \
            -storepass "$ANDROID_STORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -signedjar "$SIGNED_AAB_PATH" \
            "$AAB_PATH" \
            "$ANDROID_KEY_ALIAS"
          jarsigner -verify "$SIGNED_AAB_PATH"
          mv "$SIGNED_AAB_PATH" "$AAB_PATH"

      - name: Upload signed AAB artifact
        if: inputs.deploy-android-to != 'none' && inputs.android-reuse-aab-artifact-name == ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab

      - name: Upload unsigned AAB artifact
        if: inputs.build-android-unsigned-aab && inputs.android-reuse-aab-artifact-name == '' && inputs.deploy-android-to == 'none'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-unsigned-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab

      - name: Upload APK artifact
        id: upload-apk
        if: inputs.deploy-android-to == 'none'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-apk-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-debug.apk

      - name: Fetch PR commits
        if: inputs.pr-number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          python3 << 'SCRIPT'
          import json, os, sys, uuid, urllib.request

          try:
              token = os.environ['GH_TOKEN']
              repo = os.environ['GITHUB_REPOSITORY']
              pr = os.environ['PR_NUMBER']
              base_url = f'https://api.github.com/repos/{repo}/pulls/{pr}/commits'
              headers = {
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
              }
              commits = []
              page = 1
              max_commits = 100
              while True:
                  url = f'{base_url}?per_page=100&page={page}'
                  req = urllib.request.Request(url, headers=headers)
                  data = json.loads(urllib.request.urlopen(req).read())
                  if not data:
                      break
                  commits.extend(data)
                  if len(data) < 100 or len(commits) >= max_commits:
                      break
                  page += 1
              commits = commits[:max_commits]
              lines = []
              for c in reversed(commits):
                  sha = c['sha'][:7]
                  msg = c['commit']['message'].split('\n')[0]
                  lines.append(f'{sha} {msg}')
              delim = f'FLUTTY_EOF_{uuid.uuid4().hex}'
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'FLUTTY_PR_COMMITS<<{delim}\n')
                  f.write('\n'.join(lines))
                  f.write(f'\n{delim}\n')
          except Exception as e:
              print(f'Warning: failed to fetch PR commits: {e}', file=sys.stderr)
          SCRIPT

      - name: Setup Ruby for Play deployment
        if: inputs.deploy-android-to != 'none' && inputs.run-android-deploy
        uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1.301.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Refresh Play Store icon metadata
        if: inputs.deploy-android-to != 'none' && inputs.run-android-deploy && inputs.sync-metadata
        run: |
          python -m pip install --quiet Pillow
          python scripts/sync_play_store_icons.py

      - name: Validate Play Store metadata
        if: inputs.deploy-android-to != 'none' && inputs.run-android-deploy && inputs.sync-metadata
        run: |
          python3 scripts/validate_play_store_metadata.py ${{ inputs.flavor }}

      - name: Run Fastlane
        if: inputs.deploy-android-to != 'none' && inputs.run-android-deploy
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          AAB_PATH: ../build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab
          ANDROID_VERSION_CODE: ${{ inputs.build-number }}
          FLUTTY_BUILD_NAME: ${{ inputs.build-name }}
          FLUTTY_VERSION_CODENAME: ${{ inputs.build-codename }}
          FLUTTY_SOURCE_SHA: ${{ steps.resolved-source-sha.outputs.value }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd android
          SKIP_META=${{ inputs.sync-metadata && 'false' || 'true' }}
          PACKAGE_NAME="${{ inputs.flavor == 'private' && 'xyz.depollsoft.monkeyssh.private' || 'xyz.depollsoft.monkeyssh' }}"
          if [ "${{ inputs.deploy-android-to }}" = "internal" ]; then
            bundle exec fastlane internal package_name:"$PACKAGE_NAME" skip_metadata:"$SKIP_META" version_code:"$ANDROID_VERSION_CODE"
          elif [ "${{ inputs.deploy-android-to }}" = "production" ]; then
            bundle exec fastlane release skip_metadata:"$SKIP_META" version_code:"$ANDROID_VERSION_CODE"
          fi

      - name: Remove Android signing material
        if: always() && inputs.deploy-android-to != 'none' && (inputs.android-reuse-aab-artifact-name == '' || inputs.android-reuse-aab-is-unsigned)
        run: rm -f android/app/upload-keystore.jks android/app/key.properties

  build-ios:
    name: Build & Deploy iOS (${{ inputs.flavor }})
    if: inputs.build-ios
    runs-on: macos-26
    env:
      FLUTTY_PR_NUMBER: ${{ inputs.pr-number }}
      FLUTTY_PR_TITLE: ${{ inputs.pr-title }}
    outputs:
      source-sha: ${{ steps.resolved-source-sha.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          fetch-depth: 2

      - name: Capture source SHA
        id: source-sha
        env:
          REQUESTED_SOURCE_REF: ${{ inputs.source-ref }}
          REUSED_SOURCE_SHA: ${{ inputs.ios-reuse-source-sha }}
        run: |
          if [ -n "$REUSED_SOURCE_SHA" ]; then
            echo "value=$REUSED_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          elif echo "$REQUESTED_SOURCE_REF" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "value=$REQUESTED_SOURCE_REF" >> "$GITHUB_OUTPUT"
          elif [ -n "$REQUESTED_SOURCE_REF" ]; then
            git fetch --no-tags --depth=1 origin -- "$REQUESTED_SOURCE_REF"
            echo "value=$(git rev-parse FETCH_HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve source SHA
        id: resolved-source-sha
        env:
          REUSED_SOURCE_SHA: ${{ inputs.ios-reuse-source-sha }}
          CHECKED_OUT_SOURCE_SHA: ${{ steps.source-sha.outputs.value }}
        run: |
          if [ -n "$REUSED_SOURCE_SHA" ]; then
            echo "value=$REUSED_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "value=$CHECKED_OUT_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout requested source ref for iOS build
        if: inputs.source-ref != '' && inputs.ios-reuse-ipa-artifact-name == ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ steps.source-sha.outputs.value }}
          fetch-depth: 1

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        if: inputs.ios-reuse-ipa-artifact-name == ''
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-ios-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        if: inputs.ios-reuse-ipa-artifact-name == ''
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # v1.301.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        if: inputs.ios-reuse-ipa-artifact-name == ''
        run: flutter pub get

      - name: Setup code signing
        if: inputs.deploy-ios-to != 'none' && (inputs.ios-reuse-ipa-artifact-name == '' || inputs.ios-reuse-ipa-is-unsigned)
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd ios
          if [ "${{ inputs.flavor }}" = "private" ]; then
            bundle exec fastlane setup_signing app_identifier:xyz.depollsoft.monkeyssh.private
          else
            bundle exec fastlane setup_signing app_identifier:xyz.depollsoft.monkeyssh
          fi

      - name: Build iOS
        if: inputs.ios-reuse-ipa-artifact-name == ''
        env:
          DEPLOY_IOS_TO: ${{ inputs.deploy-ios-to }}
        run: |
          EXTRA_FLAGS=()
          if [ "$DEPLOY_IOS_TO" = "none" ]; then
            EXTRA_FLAGS+=(--no-tree-shake-icons)
          fi
          flutter build ios \
            --flavor ${{ inputs.flavor }} \
            --release \
            --no-codesign \
            "${EXTRA_FLAGS[@]}" \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Package unsigned IPA
        if: inputs.build-ios-unsigned-ipa && inputs.ios-reuse-ipa-artifact-name == '' && inputs.deploy-ios-to == 'none'
        run: |
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -name '*.app' -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo 'Expected a built .app bundle under build/ios/iphoneos, but none was found.'
            ls -la build/ios/iphoneos || true
            exit 1
          fi
          APP_BUNDLE_NAME=$(basename "$APP_PATH")

          bundle_executable_path() {
            local bundle_path="$1"
            local info_plist="$bundle_path/Info.plist"
            if [ ! -f "$info_plist" ]; then
              echo "Expected Info.plist at $info_plist" >&2
              return 1
            fi

            /usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$info_plist"
          }

          add_swift_scan_args() {
            local bundle_path="$1"
            local executable_name
            executable_name=$(bundle_executable_path "$bundle_path")
            SWIFT_SCAN_ARGS+=("--scan-executable" "$bundle_path/$executable_name")

            if [ -d "$bundle_path/Frameworks" ]; then
              SWIFT_SCAN_ARGS+=("--scan-folder" "$bundle_path/Frameworks")
            fi
          }

          rm -rf build/ios/unsigned
          mkdir -p build/ios/unsigned/Payload build/ios/ipa
          ditto "$APP_PATH" "build/ios/unsigned/Payload/$APP_BUNDLE_NAME"

          SWIFT_SUPPORT_DIR=build/ios/unsigned/SwiftSupport/iphoneos
          mkdir -p "$SWIFT_SUPPORT_DIR"
          declare -a SWIFT_SCAN_ARGS=()
          add_swift_scan_args "build/ios/unsigned/Payload/$APP_BUNDLE_NAME"
          if [ -d "build/ios/unsigned/Payload/$APP_BUNDLE_NAME/PlugIns" ]; then
            while IFS= read -r -d '' APPEX_PATH; do
              add_swift_scan_args "$APPEX_PATH"
            done < <(find "build/ios/unsigned/Payload/$APP_BUNDLE_NAME/PlugIns" -mindepth 1 -maxdepth 1 -name '*.appex' -type d -print0)
          fi
          xcrun swift-stdlib-tool --copy --platform iphoneos --destination "$SWIFT_SUPPORT_DIR" "${SWIFT_SCAN_ARGS[@]}"
          if ! find "$SWIFT_SUPPORT_DIR" -type f | grep -q .; then
            rm -rf build/ios/unsigned/SwiftSupport
          fi

          (
            cd build/ios/unsigned
            ZIP_INPUTS=(Payload)
            if [ -d SwiftSupport ]; then
              ZIP_INPUTS+=(SwiftSupport)
            fi
            zip -qry ../ipa/Runner-unsigned.ipa "${ZIP_INPUTS[@]}"
          )

      - name: Download reusable IPA artifact
        if: inputs.ios-reuse-ipa-artifact-name != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.ios-reuse-run-id }}
          name: ${{ inputs.ios-reuse-ipa-artifact-name }}
          path: build/ios/ipa

      - name: Fetch PR commits
        if: inputs.pr-number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          python3 << 'SCRIPT'
          import json, os, sys, uuid, urllib.request

          try:
              token = os.environ['GH_TOKEN']
              repo = os.environ['GITHUB_REPOSITORY']
              pr = os.environ['PR_NUMBER']
              base_url = f'https://api.github.com/repos/{repo}/pulls/{pr}/commits'
              headers = {
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
              }
              commits = []
              page = 1
              max_commits = 100
              while True:
                  url = f'{base_url}?per_page=100&page={page}'
                  req = urllib.request.Request(url, headers=headers)
                  data = json.loads(urllib.request.urlopen(req).read())
                  if not data:
                      break
                  commits.extend(data)
                  if len(data) < 100 or len(commits) >= max_commits:
                      break
                  page += 1
              commits = commits[:max_commits]
              lines = []
              for c in reversed(commits):
                  sha = c['sha'][:7]
                  msg = c['commit']['message'].split('\n')[0]
                  lines.append(f'{sha} {msg}')
              delim = f'FLUTTY_EOF_{uuid.uuid4().hex}'
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'FLUTTY_PR_COMMITS<<{delim}\n')
                  f.write('\n'.join(lines))
                  f.write(f'\n{delim}\n')
          except Exception as e:
              print(f'Warning: failed to fetch PR commits: {e}', file=sys.stderr)
          SCRIPT

      - name: Archive, sign & deploy via Fastlane
        if: inputs.deploy-ios-to != 'none'
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          FLUTTY_BUILD_NAME: ${{ inputs.build-name }}
          FLUTTY_VERSION_CODENAME: ${{ inputs.build-codename }}
          FLUTTY_SOURCE_SHA: ${{ steps.resolved-source-sha.outputs.value }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd ios
          SCHEME="${{ inputs.flavor == 'private' && 'Private' || 'Production' }}"
          SKIP_META=${{ inputs.sync-metadata && 'false' || 'true' }}
          REUSED_IPA_PATH=''
          if [ -n '${{ inputs.ios-reuse-ipa-artifact-name }}' ]; then
            REUSED_IPA_PATH=$(find ../build/ios/ipa -name '*.ipa' -print -quit)
            if [ -z "$REUSED_IPA_PATH" ]; then
              echo "Expected a reusable IPA artifact, but none was downloaded."
              find ../build/ios/ipa -maxdepth 4 -print || true
              exit 1
            fi
            REUSED_IPA_PATH="$(python3 -c 'import os, sys; print(os.path.abspath(sys.argv[1]))' "$REUSED_IPA_PATH")"
          fi

          if [ "${{ inputs.ios-reuse-ipa-is-unsigned }}" = 'true' ]; then
            if [ -z "$REUSED_IPA_PATH" ]; then
              echo "ios-reuse-ipa-is-unsigned requires a reusable IPA artifact to be downloaded first."
              exit 1
            fi
            SIGNED_IPA_PATH="$(python3 -c 'import os; print(os.path.abspath("../build/ios/ipa/resigned-${{ inputs.flavor }}.ipa"))')"
            bundle exec fastlane resign_ipa \
              scheme:"$SCHEME" \
              unsigned_ipa_path:"$REUSED_IPA_PATH" \
              output_ipa_path:"$SIGNED_IPA_PATH"
            REUSED_IPA_PATH="$SIGNED_IPA_PATH"
          fi

          if [ "${{ inputs.run-ios-deploy }}" = "true" ]; then
            if [ "${{ inputs.deploy-ios-to }}" = "testflight" ]; then
              bundle exec fastlane beta scheme:"$SCHEME" skip_metadata:"$SKIP_META" ipa_path:"$REUSED_IPA_PATH"
            elif [ "${{ inputs.deploy-ios-to }}" = "appstore" ]; then
              bundle exec fastlane release scheme:"$SCHEME" skip_metadata:"$SKIP_META" ipa_path:"$REUSED_IPA_PATH"
            fi
          elif [ -z "$REUSED_IPA_PATH" ]; then
            bundle exec fastlane build_ipa scheme:"$SCHEME"
          fi

      - name: Upload signed IPA artifact
        if: inputs.deploy-ios-to != 'none' && inputs.ios-reuse-ipa-artifact-name == ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: build/ios/ipa/*.ipa

      - name: Upload unsigned IPA artifact
        if: inputs.build-ios-unsigned-ipa && inputs.ios-reuse-ipa-artifact-name == '' && inputs.deploy-ios-to == 'none'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-unsigned-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: build/ios/ipa/Runner-unsigned.ipa

  deploy-status-summary:
    name: Summarize Deploy Status
    needs: [build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      android-deploy-status: ${{ steps.summary.outputs.android-deploy-status }}
      ios-deploy-status: ${{ steps.summary.outputs.ios-deploy-status }}
    steps:
      - name: Summarize platform deploy results
        id: summary
        env:
          BUILD_ANDROID_ENABLED: ${{ inputs.build-android }}
          BUILD_IOS_ENABLED: ${{ inputs.build-ios }}
          RUN_ANDROID_DEPLOY: ${{ inputs.run-android-deploy }}
          RUN_IOS_DEPLOY: ${{ inputs.run-ios-deploy }}
          ANDROID_TARGET: ${{ inputs.deploy-android-to }}
          IOS_TARGET: ${{ inputs.deploy-ios-to }}
          ANDROID_RESULT: ${{ needs.build-android.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
        run: |
          android_status=''
          if [ "$BUILD_ANDROID_ENABLED" = 'true' ] && [ "$ANDROID_TARGET" != 'none' ]; then
            if [ "$RUN_ANDROID_DEPLOY" != 'true' ]; then
              android_status='⏭️ Android deploy skipped (run-android-deploy=false)'
            else
              case "$ANDROID_RESULT" in
                success)
                  if [ "$ANDROID_TARGET" = 'production' ]; then
                    android_status='✅ Deployed to Play production'
                  else
                    android_status='✅ Deployed to Play internal'
                  fi
                  ;;
                cancelled)
                  android_status='⛔ Android deploy cancelled'
                  ;;
                skipped)
                  android_status='⏭️ Android deploy skipped'
                  ;;
                *)
                  android_status='❌ Android deploy failed'
                  ;;
              esac
            fi
          fi

          ios_status=''
          if [ "$BUILD_IOS_ENABLED" = 'true' ] && [ "$IOS_TARGET" != 'none' ]; then
            if [ "$RUN_IOS_DEPLOY" != 'true' ]; then
              ios_status='⏭️ iOS deploy skipped (run-ios-deploy=false)'
            else
              case "$IOS_RESULT" in
                success)
                  if [ "$IOS_TARGET" = 'appstore' ]; then
                    ios_status='✅ Uploaded to App Store Connect'
                  else
                    ios_status='✅ Uploaded to TestFlight'
                  fi
                  ;;
                cancelled)
                  ios_status='⛔ iOS deploy cancelled'
                  ;;
                skipped)
                  ios_status='⏭️ iOS deploy skipped'
                  ;;
                *)
                  ios_status='❌ iOS deploy failed'
                  ;;
              esac
            fi
          fi

          echo "android-deploy-status=$android_status" >> "$GITHUB_OUTPUT"
          echo "ios-deploy-status=$ios_status" >> "$GITHUB_OUTPUT"

  update-android-deploy-comment:
    name: Update Android Deploy Comment
    needs: [build-android]
    if: always() && inputs.update-pr-deploy-comment && inputs.pr-number != '' && inputs.build-android && inputs.run-android-deploy && inputs.deploy-android-to != 'none'
    runs-on: ubuntu-latest
    steps:
      - name: Update Android status row
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number('${{ inputs.pr-number }}');
            const statusMarker = '<!-- preview-deploy-status -->';
            const androidTarget = '${{ inputs.deploy-android-to }}';
            const androidResult = '${{ needs.build-android.result }}';

            let androidStatus = '❌ Android deploy failed';
            if (androidResult === 'success') {
              androidStatus =
                androidTarget === 'production'
                  ? '✅ Deployed to Play production'
                  : '✅ Deployed to Play internal';
            } else if (androidResult === 'cancelled') {
              androidStatus = '⛔ Android deploy cancelled';
            } else if (androidResult === 'skipped') {
              androidStatus = '⏭️ Android deploy skipped';
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(statusMarker));
            if (!existing || !existing.body) {
              core.info(`No preview deploy status comment found for PR #${issueNumber}.`);
              return;
            }

            const updatedBody = existing.body
              .split('\n')
              .map((line) =>
                line.startsWith('| **Android Status** |')
                  ? `| **Android Status** | ${androidStatus} |`
                  : line,
              )
              .join('\n');

            if (updatedBody === existing.body) {
              core.info(`Android status row missing on preview deploy comment for PR #${issueNumber}.`);
              return;
            }

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body: updatedBody,
            });

  update-ios-deploy-comment:
    name: Update iOS Deploy Comment
    needs: [build-ios]
    if: always() && inputs.update-pr-deploy-comment && inputs.pr-number != '' && inputs.build-ios && inputs.run-ios-deploy && inputs.deploy-ios-to != 'none'
    runs-on: ubuntu-latest
    steps:
      - name: Update iOS status row
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number('${{ inputs.pr-number }}');
            const statusMarker = '<!-- preview-deploy-status -->';
            const iosTarget = '${{ inputs.deploy-ios-to }}';
            const iosResult = '${{ needs.build-ios.result }}';

            let iosStatus = '❌ iOS deploy failed';
            if (iosResult === 'success') {
              iosStatus =
                iosTarget === 'appstore'
                  ? '✅ Uploaded to App Store Connect'
                  : '✅ Uploaded to TestFlight';
            } else if (iosResult === 'cancelled') {
              iosStatus = '⛔ iOS deploy cancelled';
            } else if (iosResult === 'skipped') {
              iosStatus = '⏭️ iOS deploy skipped';
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(statusMarker));
            if (!existing || !existing.body) {
              core.info(`No preview deploy status comment found for PR #${issueNumber}.`);
              return;
            }

            const updatedBody = existing.body
              .split('\n')
              .map((line) =>
                line.startsWith('| **iOS Status** |')
                  ? `| **iOS Status** | ${iosStatus} |`
                  : line,
              )
              .join('\n');

            if (updatedBody === existing.body) {
              core.info(`iOS status row missing on preview deploy comment for PR #${issueNumber}.`);
              return;
            }

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body: updatedBody,
            });

  record-private-deploy-build-number:
    name: Record Private Deploy Build Number
    needs: [build-android, build-ios]
    if: inputs.flavor == 'private' && (inputs.deploy-ios-to != 'none' || inputs.deploy-android-to != 'none') && needs.build-android.result == 'success' && needs.build-ios.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Write private deploy build marker
        run: |
          mkdir -p build/private-deploy-marker
          printf '%s\n' '${{ inputs.build-number }}' > build/private-deploy-marker/build-number.txt

      - name: Upload private deploy build marker
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: private-deploy-build-number-${{ inputs.build-number }}
          path: build/private-deploy-marker/build-number.txt
