name: Build & Deploy

on:
  workflow_call:
    inputs:
      build-name:
        required: true
        type: string
        description: 'Version name (e.g., 0.1.0-pr.42 or 1.2.0)'
      build-number:
        required: true
        type: string
        description: 'Build number (integer, monotonically increasing)'
      pr-number:
        required: false
        type: string
        default: ''
        description: 'Pull request number for preview-derived builds'
      pr-title:
        required: false
        type: string
        default: ''
        description: 'Pull request title for preview-derived builds'
      flavor:
        required: true
        type: string
        description: 'Flutter flavor (private or production)'
      source-ref:
        required: false
        type: string
        default: ''
        description: 'Git ref to build (branch, tag, or refs/pull/*/head)'
      deploy-ios-to:
        required: false
        type: string
        default: 'none'
        description: 'iOS deploy target: testflight, appstore, or none'
      deploy-android-to:
        required: false
        type: string
        default: 'none'
        description: 'Android deploy target: internal, production, or none'
      build-android:
        required: false
        type: boolean
        default: true
        description: 'Whether to run the Android build job'
      build-ios:
        required: false
        type: boolean
        default: true
        description: 'Whether to run the iOS build job'
      sync-metadata:
        required: false
        type: boolean
        default: false
        description: 'Whether to sync store metadata alongside the deploy'
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
      ANDROID_STORE_PASSWORD:
        required: false
      PLAY_STORE_SERVICE_ACCOUNT_JSON:
        required: false
      MATCH_GIT_URL:
        required: false
      MATCH_PASSWORD:
        required: false
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        required: false
      APP_STORE_CONNECT_API_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_API_KEY_CONTENT:
        required: false
    outputs:
      apk-artifact-id:
        description: 'Artifact ID of the uploaded APK'
        value: ${{ jobs.build-android.outputs.apk-artifact-id }}
      android-source-sha:
        description: 'Git SHA used for Android build checkout'
        value: ${{ jobs.build-android.outputs.source-sha }}
      ios-source-sha:
        description: 'Git SHA used for iOS build checkout'
        value: ${{ jobs.build-ios.outputs.source-sha }}

permissions:
  contents: read

jobs:
  build-android:
    name: Build & Deploy Android (${{ inputs.flavor }})
    if: inputs.build-android
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      FLUTTY_PR_NUMBER: ${{ inputs.pr-number }}
      FLUTTY_PR_TITLE: ${{ inputs.pr-title }}
    outputs:
      apk-artifact-id: ${{ steps.upload-apk.outputs.artifact-id }}
      source-sha: ${{ steps.source-sha.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.source-ref || github.ref }}

      - name: Capture source SHA
        id: source-sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/build.gradle*', 'android/app/build.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate Android signing secrets
        if: inputs.deploy-android-to != 'none'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_KEYSTORE_BASE64 is required for signed Android release builds."
            exit 1
          fi
          if [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_KEY_ALIAS is required for signed Android release builds."
            exit 1
          fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_KEY_PASSWORD is required for signed Android release builds."
            exit 1
          fi
          if [ -z "$ANDROID_STORE_PASSWORD" ]; then
            echo "::error title=Missing Android signing secret::ANDROID_STORE_PASSWORD is required for signed Android release builds."
            exit 1
          fi

      - name: Decode keystore
        if: inputs.deploy-android-to != 'none'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          umask 077
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        if: inputs.deploy-android-to != 'none'
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          umask 077
          cat > android/app/key.properties << EOF_KEY_PROPERTIES
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF_KEY_PROPERTIES

      - name: Build AAB
        if: inputs.deploy-android-to != 'none'
        run: |
          flutter build appbundle \
            --flavor ${{ inputs.flavor }} \
            --release \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Build release APK
        if: inputs.deploy-android-to != 'none'
        run: |
          flutter build apk \
            --flavor ${{ inputs.flavor }} \
            --release \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Build debug APK
        if: inputs.deploy-android-to == 'none'
        run: |
          flutter build apk \
            --flavor ${{ inputs.flavor }} \
            --debug \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Upload AAB artifact
        if: inputs.deploy-android-to != 'none'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab

      - name: Upload APK artifact
        id: upload-apk
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-apk-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: ${{ inputs.deploy-android-to != 'none' && format('build/app/outputs/flutter-apk/app-{0}-release.apk', inputs.flavor) || format('build/app/outputs/flutter-apk/app-{0}-debug.apk', inputs.flavor) }}

      - name: Setup Ruby for Play deployment
        if: inputs.deploy-android-to != 'none'
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Refresh Play Store icon metadata
        if: inputs.deploy-android-to != 'none' && inputs.sync-metadata
        run: |
          python -m pip install --quiet Pillow
          python scripts/sync_play_store_icons.py

      - name: Validate Play Store metadata
        if: inputs.deploy-android-to != 'none' && inputs.sync-metadata
        run: |
          python3 scripts/validate_play_store_metadata.py ${{ inputs.flavor }}

      - name: Run Fastlane
        if: inputs.deploy-android-to != 'none'
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          AAB_PATH: ../build/app/outputs/bundle/${{ inputs.flavor }}Release/app-${{ inputs.flavor }}-release.aab
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd android
          SKIP_META=${{ inputs.sync-metadata && 'false' || 'true' }}
          PACKAGE_NAME="${{ inputs.flavor == 'private' && 'xyz.depollsoft.monkeyssh.private' || 'xyz.depollsoft.monkeyssh' }}"
          if [ "${{ inputs.deploy-android-to }}" = "internal" ]; then
            bundle exec fastlane internal package_name:"$PACKAGE_NAME" skip_metadata:"$SKIP_META"
          elif [ "${{ inputs.deploy-android-to }}" = "production" ]; then
            bundle exec fastlane release skip_metadata:"$SKIP_META"
          fi

      - name: Remove Android signing material
        if: always() && inputs.deploy-android-to != 'none'
        run: rm -f android/app/upload-keystore.jks android/app/key.properties

  build-ios:
    name: Build & Deploy iOS (${{ inputs.flavor }})
    if: inputs.build-ios
    runs-on: macos-26
    env:
      FLUTTY_PR_NUMBER: ${{ inputs.pr-number }}
      FLUTTY_PR_TITLE: ${{ inputs.pr-title }}
    outputs:
      source-sha: ${{ steps.source-sha.outputs.value }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.source-ref || github.ref }}

      - name: Capture source SHA
        id: source-sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup code signing
        if: inputs.deploy-ios-to != 'none'
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd ios
          if [ "${{ inputs.flavor }}" = "private" ]; then
            bundle exec fastlane setup_signing app_identifier:xyz.depollsoft.monkeyssh.private
          else
            bundle exec fastlane setup_signing app_identifier:xyz.depollsoft.monkeyssh
          fi

      - name: Build iOS
        run: |
          flutter build ios \
            --flavor ${{ inputs.flavor }} \
            --release \
            --no-codesign \
            --build-name=${{ inputs.build-name }} \
            --build-number=${{ inputs.build-number }} \
            --dart-define=FLUTTY_PR_NUMBER="$FLUTTY_PR_NUMBER" \
            --dart-define=FLUTTY_PR_TITLE="$FLUTTY_PR_TITLE"

      - name: Archive, sign & deploy via Fastlane
        if: inputs.deploy-ios-to != 'none'
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
        run: |
          cd ios
          SCHEME="${{ inputs.flavor == 'private' && 'Private' || 'Production' }}"
          SKIP_META=${{ inputs.sync-metadata && 'false' || 'true' }}
          if [ "${{ inputs.deploy-ios-to }}" = "testflight" ]; then
            bundle exec fastlane beta scheme:"$SCHEME" skip_metadata:"$SKIP_META"
          elif [ "${{ inputs.deploy-ios-to }}" = "appstore" ]; then
            bundle exec fastlane release scheme:"$SCHEME" skip_metadata:"$SKIP_META"
          fi

      - name: Upload IPA artifact
        if: inputs.deploy-ios-to != 'none'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ios-${{ inputs.flavor }}-${{ inputs.build-name }}-${{ inputs.build-number }}
          path: build/ios/ipa/*.ipa
