name: Security

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed dependency lockfiles
        id: changed-deps
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = '0000000000000000000000000000000000000000' ]; then
            if git rev-parse "${HEAD_SHA}^" >/dev/null 2>&1; then
              BASE_SHA=$(git rev-parse "${HEAD_SHA}^")
            else
              BASE_SHA=''
            fi
          fi

          if [ -z "${BASE_SHA}" ]; then
            echo '- No baseline commit was available for dependency comparison, so the fallback OSV diff scan was skipped.' >> "$GITHUB_STEP_SUMMARY"
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t detected_targets < <(
            git diff --name-only --diff-filter=ACMR "${BASE_SHA}" "${HEAD_SHA}" | while IFS= read -r path; do
              case "${path}" in
                Gemfile|Gemfile.lock)
                  printf '%s\n' 'scan:Gemfile.lock'
                  ;;
                pubspec.yaml|pubspec.lock)
                  printf '%s\n' 'scan:pubspec.lock'
                  ;;
                ios/Podfile|ios/Podfile.lock)
                  printf '%s\n' 'skip:ios/Podfile.lock'
                  ;;
                macos/Podfile|macos/Podfile.lock)
                  printf '%s\n' 'skip:macos/Podfile.lock'
                  ;;
              esac
            done | awk '!seen[$0]++'
          )

          dependency_targets=()
          unsupported_targets=()
          for target in "${detected_targets[@]}"; do
            case "${target}" in
              scan:*)
                dependency_targets+=("${target#scan:}")
                ;;
              skip:*)
                unsupported_targets+=("${target#skip:}")
                ;;
            esac
          done

          {
            echo '## Dependency review fallback'
            echo '- GitHub dependency review is unavailable in this repository because dependency graph is disabled.'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${#unsupported_targets[@]}" -gt 0 ]; then
            echo '- Skipping unsupported fallback lockfiles because the current OSV source scan cannot extract CocoaPods `Podfile.lock` files:' >> "$GITHUB_STEP_SUMMARY"
            for target in "${unsupported_targets[@]}"; do
              echo "  - \`${target}\`" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

          if [ "${#dependency_targets[@]}" -eq 0 ]; then
            if [ "${#unsupported_targets[@]}" -eq 0 ]; then
              echo '- No supported dependency lockfiles changed in this comparison range, so no fallback OSV diff scan was needed.' >> "$GITHUB_STEP_SUMMARY"
            else
              echo '- No OSV-supported dependency lockfiles changed in this comparison range, so no fallback OSV diff scan was run.' >> "$GITHUB_STEP_SUMMARY"
            fi
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo '- Running an OSS OSV comparison against the changed dependency lockfiles instead.' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo 'Changed lockfiles:' >> "$GITHUB_STEP_SUMMARY"
          for target in "${dependency_targets[@]}"; do
            echo "- \`${target}\`" >> "$GITHUB_STEP_SUMMARY"
          done

          echo 'changed=true' >> "$GITHUB_OUTPUT"
          {
            echo 'files<<EOF'
            printf '%s\n' "${dependency_targets[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Compare changed dependencies with OSV
        if: steps.changed-deps.outputs.changed == 'true'
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          CHANGED_FILES: ${{ steps.changed-deps.outputs.files }}
          OSV_SCANNER_IMAGE: ghcr.io/google/osv-scanner:v2.3.3
        run: |
          set -euo pipefail

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = '0000000000000000000000000000000000000000' ]; then
            BASE_SHA=$(git rev-parse "${GITHUB_SHA}^")
          fi

          scan_root="${RUNNER_TEMP}/dependency-review"
          base_root="${scan_root}/base"
          head_root="${scan_root}/head"
          results_root="${scan_root}/results"
          index_file="${results_root}/index.tsv"

          mkdir -p "${base_root}" "${head_root}" "${results_root}"
          : > "${index_file}"

          run_osv_scan() {
            local mounted_path="$1"
            local output_path="$2"
            local status

            set +e
            docker run --rm \
              -v "${scan_root}:/scan" \
              "${OSV_SCANNER_IMAGE}" \
              scan --format json -L "/scan/${mounted_path}" > "${output_path}"
            status=$?
            set -e

            if [ "${status}" -gt 1 ]; then
              echo "::error::OSV scanner failed while scanning ${mounted_path} (exit ${status})."
              return "${status}"
            fi
          }

          while IFS= read -r file; do
            [ -n "${file}" ] || continue

            mkdir -p "${head_root}/$(dirname "${file}")"
            cp "${file}" "${head_root}/${file}"

            safe_name="$(printf '%s' "${file}" | tr '/.' '__')"
            head_json="${results_root}/${safe_name}.head.json"
            base_json="${results_root}/${safe_name}.base.json"

            run_osv_scan "head/${file}" "${head_json}"

            if git cat-file -e "${BASE_SHA}:${file}" 2>/dev/null; then
              mkdir -p "${base_root}/$(dirname "${file}")"
              git show "${BASE_SHA}:${file}" > "${base_root}/${file}"
              run_osv_scan "base/${file}" "${base_json}"
            else
              printf '{"results":[]}\n' > "${base_json}"
            fi

            printf '%s\t%s\t%s\n' "${file}" "${base_json}" "${head_json}" >> "${index_file}"
          done <<< "${CHANGED_FILES}"

          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          index_path = pathlib.Path(os.environ['RUNNER_TEMP']) / 'dependency-review' / 'results' / 'index.tsv'
          summary_path = pathlib.Path(os.environ['GITHUB_STEP_SUMMARY'])

          def extract_findings(path: pathlib.Path) -> set[tuple[str, str, tuple[str, ...]]]:
              data = json.loads(path.read_text())
              findings: set[tuple[str, str, tuple[str, ...]]] = set()
              for result in data.get('results', []):
                  for package in result.get('packages', []):
                      package_info = package.get('package', {})
                      ecosystem = package_info.get('ecosystem', '')
                      name = package_info.get('name', '')
                      groups = package.get('groups') or []
                      if groups:
                          for group in groups:
                              ids = tuple(sorted(group.get('ids', [])))
                              if ids:
                                  findings.add((ecosystem, name, ids))
                          continue
                      for vulnerability in package.get('vulnerabilities', []):
                          vuln_id = vulnerability.get('id')
                          if vuln_id:
                              findings.add((ecosystem, name, (vuln_id,)))
              return findings

          introduced: list[tuple[str, list[tuple[str, str, tuple[str, ...]]]]] = []

          for line in index_path.read_text().splitlines():
              file, base_json, head_json = line.split('\t')
              base_findings = extract_findings(pathlib.Path(base_json))
              head_findings = extract_findings(pathlib.Path(head_json))
              new_findings = sorted(head_findings - base_findings)
              if new_findings:
                  introduced.append((file, new_findings))

          with summary_path.open('a', encoding='utf-8') as summary:
              summary.write('\n')
              if introduced:
                  summary.write('- ❌ The fallback OSV dependency review found newly introduced vulnerable dependencies.\n')
                  for file, findings in introduced:
                      summary.write(f'  - `{file}`\n')
                      for ecosystem, package, vuln_ids in findings:
                          vuln_list = ', '.join(vuln_ids)
                          summary.write(f'    - `{package}` ({ecosystem or "unknown"}) -> {vuln_list}\n')
              else:
                  summary.write('- ✅ No newly introduced known vulnerabilities were detected in the changed dependency lockfiles.\n')

          if introduced:
              print('Introduced vulnerabilities detected in changed dependency lockfiles:')
              for file, findings in introduced:
                  print(f'- {file}')
                  for ecosystem, package, vuln_ids in findings:
                      print(f'  - {package} ({ecosystem or "unknown"}): {", ".join(vuln_ids)}')
              sys.exit(1)

          print('No newly introduced known vulnerabilities were detected in the changed dependency lockfiles.')
          PY

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select Gitleaks scan scope
        id: gitleaks-scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          echo '## Secret scan' >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ github.event_name }}" = 'pull_request' ]; then
            {
              echo 'command=dir'
            } >> "$GITHUB_OUTPUT"
            echo 'mode=pull-request' >> "$GITHUB_OUTPUT"
            echo '- Running OSS Gitleaks against the current pull request checkout so only leaks present in the proposed changes stay blocking.' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = 'push' ]; then
            if [ -n "${PUSH_BEFORE}" ] && [ "${PUSH_BEFORE}" != '0000000000000000000000000000000000000000' ]; then
              {
                echo 'command=git'
                echo 'log-opts<<EOF'
                echo "--no-merges ${PUSH_BEFORE}..${PUSH_AFTER}"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              echo 'mode=push-range' >> "$GITHUB_OUTPUT"
              echo '- Running OSS Gitleaks against the commits introduced by this push so newly added leaks still block protected branches.' >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo 'command=git'
                echo 'log-opts<<EOF'
                echo "--no-merges ${PUSH_AFTER}"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
              echo 'mode=push-history' >> "$GITHUB_OUTPUT"
              echo '- Running OSS Gitleaks against all commits reachable from the pushed HEAD commit because no prior push base SHA was available.' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            {
              echo 'command=git'
              echo 'log-opts<<EOF'
              echo '--no-merges --all'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            echo 'mode=full-history' >> "$GITHUB_OUTPUT"
            echo '- Running OSS Gitleaks against the full git history for scheduled or manually triggered scans.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Scan repository for leaked secrets
        id: gitleaks-scan
        continue-on-error: true
        env:
          GITLEAKS_COMMAND: ${{ steps.gitleaks-scope.outputs.command }}
          GITLEAKS_IMAGE: ghcr.io/gitleaks/gitleaks:v8.30.1
          GITLEAKS_LOG_OPTS: ${{ steps.gitleaks-scope.outputs.log-opts }}
        run: |
          set -euo pipefail

          scan_args=(
            "${GITLEAKS_COMMAND}"
            --config
            /repo/.gitleaks.toml
            --no-banner
            --redact
            --report-format sarif
            --report-path /repo/gitleaks.sarif
          )

          if [ -n "${GITLEAKS_LOG_OPTS:-}" ]; then
            scan_args+=(--log-opts="${GITLEAKS_LOG_OPTS}")
          fi

          scan_args+=(/repo)

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            "${GITLEAKS_IMAGE}" \
            "${scan_args[@]}"

      - name: Upload Gitleaks SARIF to code scanning
        if: always() && hashFiles('gitleaks.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks SARIF artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gitleaks-results-${{ github.run_id }}
          path: gitleaks.sarif

      - name: Summarize Gitleaks findings
        if: always()
        run: |
          if [ "${{ steps.gitleaks-scan.outcome }}" = 'failure' ]; then
            echo "- The OSS Gitleaks ${{ steps.gitleaks-scope.outputs.mode }} scan detected secrets or encountered a scan error. Review the job logs and any uploaded SARIF results for details." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No leaked secrets were detected by the OSS Gitleaks ${{ steps.gitleaks-scope.outputs.mode }} scan." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on secret scan findings
        if: steps.gitleaks-scan.outcome == 'failure'
        run: exit 1

  osv-scan:
    name: OSV Dependency Scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OSV scanner
        id: osv-scan
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
        with:
          scan-args: |-
            --recursive
            ./
            --format=sarif
            --output=results.sarif

      - name: Upload OSV SARIF to code scanning
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: results.sarif
          category: osv-scan

      - name: Upload OSV SARIF artifact
        if: always() && hashFiles('results.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: osv-results-${{ github.run_id }}
          path: results.sarif

      - name: Summarize OSV findings
        if: always()
        run: |
          echo "## OSV scan" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.osv-scan.outcome }}" = "failure" ]; then
            echo '- The baseline OSV scan reported repository vulnerabilities or failed before completion. Results were uploaded to code scanning, while the dependency review job remains responsible for blocking newly introduced vulnerable lockfile changes.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No vulnerabilities were detected by the baseline OSV scan." >> "$GITHUB_STEP_SUMMARY"
          fi
