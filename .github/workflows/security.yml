name: Security

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository for leaked secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_SUMMARY: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  osv-scan:
    name: OSV Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OSV scanner
        id: osv-scan
        uses: google/osv-scanner-action/osv-scanner-action@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            ./
            --format=sarif
            --output=results.sarif

      - name: Upload OSV SARIF artifact
        if: always() && hashFiles('results.sarif') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: osv-results-${{ github.run_id }}
          path: results.sarif

      - name: Summarize OSV findings
        if: always()
        run: |
          echo "## OSV scan" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.osv-scan.outcome }}" = "failure" ]; then
            echo "- Vulnerabilities were detected. Review the uploaded SARIF artifact for details." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No vulnerabilities were detected by the baseline OSV scan." >> "$GITHUB_STEP_SUMMARY"
          fi
