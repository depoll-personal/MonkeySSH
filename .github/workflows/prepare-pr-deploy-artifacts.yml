name: Prepare PR Deploy Artifacts

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to build artifacts for'
        required: true
        type: string
      source-sha:
        description: 'PR commit SHA to build'
        required: true
        type: string
      build-name:
        description: 'Version name to embed in the artifacts'
        required: true
        type: string
      build-number:
        description: 'Build number to embed in the artifacts'
        required: true
        type: string

concurrency:
  group: prepare-pr-deploy-artifacts-${{ inputs.pr-number }}-${{ inputs.source-sha }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  validate-pr:
    name: Validate PR source
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      deploy-sha: ${{ steps.validate.outputs.deploy-sha }}
      pr-title: ${{ steps.validate.outputs.pr-title }}
    steps:
      - name: Validate PR is safe to build
        id: validate
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number('${{ inputs.pr-number }}');
            const requestedSourceSha = '${{ inputs.source-sha }}'.trim();
            const {data: pr} = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            if (pr.head.repo?.full_name !== `${owner}/${repo}`) {
              core.setFailed(
                `Refusing to build signed artifacts for PR #${pull_number} from fork ${pr.head.repo.full_name}.`,
              );
              return;
            }

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            if (!commits.some((commit) => commit.sha === requestedSourceSha)) {
              core.setFailed(
                `Requested source SHA ${requestedSourceSha} is not part of PR #${pull_number}.`,
              );
              return;
            }

            core.setOutput('deploy-sha', requestedSourceSha);
            core.setOutput('pr-title', pr.title);

  build:
    name: Build reusable deploy artifacts
    needs: validate-pr
    uses: ./.github/workflows/build-deploy.yml
    with:
      build-name: ${{ inputs.build-name }}
      build-number: ${{ inputs.build-number }}
      pr-number: ${{ inputs.pr-number }}
      pr-title: ${{ needs.validate-pr.outputs.pr-title }}
      flavor: private
      source-ref: ${{ needs.validate-pr.outputs.deploy-sha }}
      deploy-ios-to: testflight
      deploy-android-to: internal
      run-ios-deploy: false
      run-android-deploy: false
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
