name: Preview Deploy Commands

on:
  issue_comment:
    types: [created]

concurrency:
  group: preview-deploy-command-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Handle /deploy command
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Dispatch preview deploy request
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository?.default_branch ?? 'main';
            const issueNumber = context.payload.issue.number;
            const commandBody = context.payload.comment.body.trim();
            const requester = context.payload.comment.user.login;
            const requestCommentId = String(context.payload.comment.id);
            const requestCommentNumber = Number(requestCommentId);
            const requestCommentUrl = context.payload.comment.html_url;
            const requestCreatedAt = context.payload.comment.created_at;
            const authorAssociation = context.payload.comment.author_association;
            const previewMarker = '<!-- Sticky Pull Request Commentpreview-build -->';
            const statusMarker = '<!-- preview-deploy-status -->';
            const workflowId = 'deploy-testflight.yml';
            const noPreviewCommentUrl = '__NO_PREVIEW_COMMENT__';
            const activeLockTimeoutMs = 4 * 60 * 60 * 1000;
            const allowedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);

            if (commandBody !== '/deploy') {
              core.info(`Ignoring PR comment without exact /deploy command: ${commandBody}`);
              return;
            }

            if (!allowedAssociations.has(authorAssociation)) {
              core.info(
                `Ignoring /deploy from ${requester} with association ${authorAssociation}.`,
              );
              return;
            }

            const readMeta = (body, key) => {
              const pattern = new RegExp(`<!-- ${key}:(.*?) -->`);
              return body.match(pattern)?.[1] ?? '';
            };

            const listRequestCommentReactions = async () =>
              github.paginate('GET /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions', {
                owner,
                repo,
                comment_id: requestCommentNumber,
                per_page: 100,
                headers: {accept: 'application/vnd.github+json'},
              });

            const ensureRequestCommentReaction = async (content) => {
              const reactions = await listRequestCommentReactions();
              if (
                reactions.some(
                  (reaction) =>
                    reaction.content === content && reaction.user?.login === 'github-actions[bot]',
                )
              ) {
                return;
              }

              await github.request(
                'POST /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions',
                {
                  owner,
                  repo,
                  comment_id: requestCommentNumber,
                  content,
                  headers: {accept: 'application/vnd.github+json'},
                },
              );
            };

            const removeRequestCommentReaction = async (content) => {
              const reactions = await listRequestCommentReactions();
              const botReactionsToDelete = reactions.filter(
                (reaction) =>
                  reaction.content === content && reaction.user?.login === 'github-actions[bot]',
              );

              for (const reaction of botReactionsToDelete) {
                await github.request(
                  'DELETE /repos/{owner}/{repo}/issues/comments/{comment_id}/reactions/{reaction_id}',
                  {
                    owner,
                    repo,
                    comment_id: requestCommentNumber,
                    reaction_id: reaction.id,
                    headers: {accept: 'application/vnd.github+json'},
                  },
                );
              }
            };

            const upsertStatusComment = async (comments, body) => {
              const existing = comments.find((comment) =>
                comment.body?.includes(statusMarker),
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                return existing.id;
              }

              const {data: created} = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
              return created.id;
            };

            const renderStatusComment = ({
              status,
              workflow,
              previewSha = '',
              previewCommentUrl = '',
              state,
              note,
            }) =>
              [
                '## 🚀 Preview Deploy',
                '',
                '| | Details |',
                '|---|---|',
                `| **Status** | ${status} |`,
                `| **Requested by** | @${requester} via \`/deploy\` comment |`,
                previewSha ? `| **Preview SHA** | \`${previewSha}\` |` : null,
                `| **Request** | [View /deploy comment](${requestCommentUrl}) |`,
                previewCommentUrl
                  ? `| **Preview Comment** | [View preview artifacts](${previewCommentUrl}) |`
                  : null,
                `| **Requested at** | ${requestCreatedAt} |`,
                `| **Workflow** | ${workflow} |`,
                '',
                note,
                statusMarker,
                `<!-- preview-deploy-state:${state} -->`,
                `<!-- preview-deploy-last-command-comment-id:${requestCommentId} -->`,
                `<!-- preview-deploy-requested-by:${requester} -->`,
                `<!-- preview-deploy-requested-at:${requestCreatedAt} -->`,
                `<!-- preview-deploy-request-comment-url:${requestCommentUrl} -->`,
                `<!-- preview-deploy-preview-comment-url:${previewCommentUrl} -->`,
                `<!-- preview-deploy-source-sha:${previewSha} -->`,
              ]
                .filter(Boolean)
                .join('\n');

            const {data: pr} = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issueNumber,
            });

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const statusComment = comments.find((comment) =>
              comment.body?.includes(statusMarker),
            );
            const statusBody = statusComment?.body ?? '';
            const currentState = readMeta(statusBody, 'preview-deploy-state');
            const lastCommandCommentId = readMeta(
              statusBody,
              'preview-deploy-last-command-comment-id',
            );
            const statusUpdatedAt = statusComment
              ? new Date(statusComment.updated_at ?? statusComment.created_at)
              : null;
            const activeLock =
              currentState === 'queued' || currentState === 'in_progress';
            const staleLock =
              activeLock &&
              statusUpdatedAt &&
              Date.now() - statusUpdatedAt.getTime() > activeLockTimeoutMs;

            if (activeLock && !staleLock) {
              core.info(
                `PR #${issueNumber}: deploy already ${currentState}; ignoring duplicate /deploy request.`,
              );
              return;
            }

            if (lastCommandCommentId === requestCommentId && !staleLock) {
              core.info(`PR #${issueNumber}: /deploy comment ${requestCommentId} already handled.`);
              return;
            }

            if (pr.head.repo?.full_name !== `${owner}/${repo}`) {
              const body = renderStatusComment({
                status: '❌ PR preview deploys only support branches in this repository',
                workflow: 'Dispatch skipped',
                previewSha: pr.head.sha,
                state: 'failed',
                note: '> This PR comes from a fork, so `/deploy` was ignored.',
              });
              await upsertStatusComment(comments, body);
              return;
            }

            const previewComment = [...comments].reverse().find((comment) =>
              comment.body?.includes(previewMarker),
            );
            const previewSha = pr.head.sha;
            const previewCommentUrl = previewComment?.html_url ?? '';
            const previewCommentBody = previewComment?.body ?? '';
            const previewCommentSha = readMeta(previewCommentBody, 'preview-build-source-sha');
            const previousDeploySha = readMeta(statusBody, 'preview-deploy-source-sha');
            let buildName =
              previewCommentSha === previewSha
                ? readMeta(previewCommentBody, 'preview-build-name')
                : '';
            let buildNumber =
              previewCommentSha === previewSha
                ? readMeta(previewCommentBody, 'preview-build-number')
                : '';

            if ((!buildName || !buildNumber) && previousDeploySha === previewSha) {
              buildName = buildName || readMeta(statusBody, 'preview-deploy-build-name');
              buildNumber = buildNumber || readMeta(statusBody, 'preview-deploy-build-number');
            }

            if (!buildName || !buildNumber) {
              const {data: pubspec} = await github.rest.repos.getContent({
                owner,
                repo,
                path: 'pubspec.yaml',
                ref: previewSha,
              });
              if (!('content' in pubspec) || typeof pubspec.content !== 'string') {
                core.setFailed(`Unable to read pubspec.yaml for ${previewSha}.`);
                return;
              }

              const pubspecBody = Buffer.from(pubspec.content, 'base64').toString('utf8');
              const versionLine = pubspecBody
                .split('\n')
                .find((line) => line.startsWith('version:'));
              if (!versionLine) {
                core.setFailed(`Unable to determine version from pubspec.yaml for ${previewSha}.`);
                return;
              }

              buildName = versionLine.replace(/^version:\s*/, '').split('+')[0].trim();
              buildNumber = String(Math.floor(Date.now() / 1000 / 10));
            }

            const queuedBody = renderStatusComment({
              status: '🔒 Lock acquired — queued for deploy',
              workflow: 'Waiting for `Deploy PR Preview` to start',
              previewSha,
              previewCommentUrl,
              state: 'queued',
              note: '> Duplicate requests stay locked out while this deploy is queued or running. The deploy workflow waits for matching unsigned preview intermediates for this SHA, then signs and uploads them without recompiling source when they are available.',
            });

            try {
              await ensureRequestCommentReaction('eyes');
            } catch (error) {
              core.warning(`Failed to add deploy reaction: ${String(error)}`);
            }

            let dispatched = false;
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id: workflowId,
                ref: defaultBranch,
                inputs: {
                  'pr-number': String(issueNumber),
                  'source-sha': previewSha,
                  'preview-build-name': buildName,
                  'preview-build-number': buildNumber,
                  'request-comment-id': requestCommentId,
                  'request-comment-at': requestCreatedAt,
                  'request-comment-user': requester,
                  'request-comment-url': requestCommentUrl,
                  'request-preview-comment-url': previewCommentUrl || noPreviewCommentUrl,
                },
              });
              dispatched = true;

              await upsertStatusComment(comments, queuedBody);
            } catch (error) {
              if (!dispatched) {
                try {
                  await removeRequestCommentReaction('eyes');
                } catch (reactionError) {
                  core.warning(`Failed to clear deploy reaction: ${String(reactionError)}`);
                }
              }

              const failureBody = renderStatusComment({
                status: '❌ Failed to dispatch `Deploy PR Preview`',
                workflow: 'Dispatch did not start; check the command workflow logs',
                previewSha,
                previewCommentUrl,
                state: 'failed',
                note: '> Add a new `/deploy` comment if you want to retry.',
              });
              await upsertStatusComment(comments, failureBody);
              throw error;
            }

            core.notice(
              `Dispatched preview deploy workflow for PR #${issueNumber} from /deploy comment ${requestCommentId}.`,
            );
