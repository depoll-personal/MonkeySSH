name: Preview Deploy Reactions

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: preview-deploy-reaction-scanner
  cancel-in-progress: true

jobs:
  scan:
    name: Scan Preview Deploy Reactions
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Dispatch preview deploy requests
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository?.default_branch ?? 'main';
            const previewMarker = '<!-- Sticky Pull Request Commentpreview-build -->';
            const statusMarker = '<!-- preview-deploy-status -->';
            const workflowId = 'deploy-testflight.yml';
            const activeLockTimeoutMs = 30 * 60 * 1000;

            const readMeta = (body, key) => {
              const pattern = new RegExp(`<!-- ${key}:(.*?) -->`);
              return body.match(pattern)?.[1] ?? '';
            };

            const upsertStatusComment = async (issueNumber, comments, body) => {
              const existing = comments.find((comment) =>
                comment.body?.includes(statusMarker),
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                return existing.id;
              }

              const {data: created} = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
              return created.id;
            };

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            core.info(`Scanning ${pulls.length} open PR(s) for preview deploy reactions.`);

            for (const pr of pulls) {
              const issueNumber = pr.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const previewComment = [...comments].reverse().find((comment) =>
                comment.body?.includes(previewMarker),
              );

              if (!previewComment) {
                core.info(`PR #${issueNumber}: no preview-build sticky comment found.`);
                continue;
              }

              const previewSha =
                previewComment.body.match(/Build triggered by ([0-9a-f]{7,40})/i)?.[1] ??
                pr.head.sha;
              const previewBuildNumber = Number(
                previewComment.body.match(/\| \*\*Build\*\* \| `(\d+)` \|/)?.[1] ?? '',
              );
              const previewEligibleAfter = Number.isFinite(previewBuildNumber)
                ? new Date(previewBuildNumber * 10 * 1000)
                : new Date(
                    previewComment.updated_at ?? previewComment.created_at,
                  );

              const reactionData = await github.graphql(
                `
                  query($id: ID!) {
                    node(id: $id) {
                      ... on IssueComment {
                        reactions(first: 100, content: ROCKET) {
                          nodes {
                            id
                            createdAt
                            user {
                              login
                            }
                          }
                        }
                      }
                    }
                  }
                `,
                {id: previewComment.node_id},
              );

              const rockets = [...(reactionData.node?.reactions?.nodes ?? [])].sort(
                (left, right) =>
                  new Date(right.createdAt).getTime() - new Date(left.createdAt).getTime(),
              );

              if (rockets.length === 0) {
                core.info(`PR #${issueNumber}: preview comment has no rocket reactions.`);
                continue;
              }

              const latestRocket = rockets[0];
              if (
                new Date(latestRocket.createdAt).getTime() <=
                previewEligibleAfter.getTime()
              ) {
                core.info(
                  `PR #${issueNumber}: latest rocket reaction predates the current preview build; ignoring stale reaction.`,
                );
                continue;
              }

              const statusComment = comments.find((comment) =>
                comment.body?.includes(statusMarker),
              );
              const statusBody = statusComment?.body ?? '';
              const currentState = readMeta(statusBody, 'preview-deploy-state');
              const lastReactionId = readMeta(
                statusBody,
                'preview-deploy-last-reaction-id',
              );
              const statusUpdatedAt = statusComment
                ? new Date(statusComment.updated_at ?? statusComment.created_at)
                : null;
              const activeLock =
                currentState === 'queued' || currentState === 'in_progress';
              const staleLock =
                activeLock &&
                statusUpdatedAt &&
                Date.now() - statusUpdatedAt.getTime() > activeLockTimeoutMs;

              if (activeLock && !staleLock) {
                core.info(
                  `PR #${issueNumber}: deploy already ${currentState}; leaving latest rocket for a later scan.`,
                );
                continue;
              }

              if (staleLock) {
                core.info(
                  `PR #${issueNumber}: ${currentState} lock is stale, allowing the latest rocket reaction to retry.`,
                );
              }

              if (lastReactionId === latestRocket.id && !staleLock) {
                core.info(
                  `PR #${issueNumber}: rocket reaction ${latestRocket.id} already handled.`,
                );
                continue;
              }

              const requestedBy = latestRocket.user?.login ?? 'unknown';
              const requestedAt = latestRocket.createdAt;
              const commentBody = [
                '## 🚀 Preview Deploy',
                '',
                '| | Details |',
                '|---|---|',
                '| **Status** | 🔒 Lock acquired — queued for deploy |',
                `| **Requested by** | @${requestedBy} via 🚀 on preview artifacts |`,
                `| **Preview SHA** | \`${previewSha}\` |`,
                `| **Preview Comment** | [View preview artifacts](${previewComment.html_url}) |`,
                `| **Requested at** | ${requestedAt} |`,
                '| **Workflow** | Waiting for `Deploy PR Preview` to start |',
                '',
                '> Duplicate requests stay locked out while this deploy is queued or running.',
                statusMarker,
                '<!-- preview-deploy-state:queued -->',
                `<!-- preview-deploy-last-reaction-id:${latestRocket.id} -->`,
                `<!-- preview-deploy-requested-by:${requestedBy} -->`,
                `<!-- preview-deploy-requested-at:${requestedAt} -->`,
                `<!-- preview-deploy-preview-comment-url:${previewComment.html_url} -->`,
                `<!-- preview-deploy-source-sha:${previewSha} -->`,
              ].join('\n');

              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner,
                  repo,
                  workflow_id: workflowId,
                  ref: defaultBranch,
                  inputs: {
                    'pr-number': String(issueNumber),
                    'source-sha': previewSha,
                    'request-reaction-id': latestRocket.id,
                    'request-reaction-at': requestedAt,
                    'request-reaction-user': requestedBy,
                    'request-preview-comment-url': previewComment.html_url,
                  },
                });

                await upsertStatusComment(issueNumber, comments, commentBody);
              } catch (error) {
                const failureBody = [
                  '## 🚀 Preview Deploy',
                  '',
                  '| | Details |',
                  '|---|---|',
                  '| **Status** | ❌ Failed to dispatch `Deploy PR Preview` |',
                  `| **Requested by** | @${requestedBy} via 🚀 on preview artifacts |`,
                  `| **Preview SHA** | \`${previewSha}\` |`,
                  `| **Preview Comment** | [View preview artifacts](${previewComment.html_url}) |`,
                  `| **Requested at** | ${requestedAt} |`,
                  '| **Workflow** | Dispatch did not start; check the scanner workflow logs |',
                  '',
                  '> Add a new 🚀 reaction after the preview comment updates if you want to retry.',
                  statusMarker,
                  '<!-- preview-deploy-state:failed -->',
                  `<!-- preview-deploy-last-reaction-id:${latestRocket.id} -->`,
                  `<!-- preview-deploy-requested-by:${requestedBy} -->`,
                  `<!-- preview-deploy-requested-at:${requestedAt} -->`,
                  `<!-- preview-deploy-preview-comment-url:${previewComment.html_url} -->`,
                  `<!-- preview-deploy-source-sha:${previewSha} -->`,
                ].join('\n');

                await upsertStatusComment(issueNumber, comments, failureBody);
                throw error;
              }

              core.notice(
                `Dispatched preview deploy workflow for PR #${issueNumber} from rocket reaction ${latestRocket.id}.`,
              );
            }
