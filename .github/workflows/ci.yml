name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'web/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'web/**'
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: Build Android
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/build.gradle*', 'android/app/build.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate CI release signing config
        run: |
          keytool -genkeypair \
            -keystore android/app/ci-release.keystore \
            -storepass ci-release \
            -keypass ci-release \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI Release,O=GitHub Actions,C=US"
          cat > android/app/key.properties << EOF
          storePassword=ci-release
          keyPassword=ci-release
          keyAlias=ci-release
          storeFile=ci-release.keystore
          EOF

      - name: Build release APK
        run: flutter build apk --flavor production --release

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-production-release.apk
          compression-level: 0

      - name: Clean up CI signing config
        if: always()
        run: rm -f android/app/key.properties android/app/ci-release.keystore

  build-ios:
    name: Build iOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --flavor production --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ios-build
          path: build/ios/iphoneos/MonkeySSH.app
          compression-level: 0

  build-macos:
    name: Build macOS
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: macos/Pods
          key: pods-macos-${{ runner.os }}-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-${{ runner.os }}-

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Upload macOS build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/MonkeySSH.app
          compression-level: 0

  build-windows:
    name: Build Windows
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Ensure ATL headers are available
        shell: pwsh
        run: |
          $vsInstallerRoot = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer'
          $vsWhere = Join-Path $vsInstallerRoot 'vswhere.exe'
          $vsInstaller = Join-Path $vsInstallerRoot 'setup.exe'
          $existingAtlHeader = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\*\VC\Tools\MSVC\*\atlmfc\include\atlstr.h" -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($existingAtlHeader) {
            Write-Host "ATL already installed at $($existingAtlHeader.FullName)"
            exit 0
          }

          if (-not (Test-Path $vsWhere)) {
            throw "Unable to locate vswhere.exe at $vsWhere"
          }

          if (-not (Test-Path $vsInstaller)) {
            throw "Unable to locate setup.exe at $vsInstaller"
          }

          $instance = (& $vsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -format json | ConvertFrom-Json) | Select-Object -First 1
          if (-not $instance) {
            throw 'Unable to locate a Visual Studio C++ toolchain installation.'
          }

          function Show-RecentInstallerLogs {
            Get-ChildItem -Path $env:TEMP -Filter 'dd_*' -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 5 |
              ForEach-Object {
                Write-Host "--- $($_.FullName) ---"
                Get-Content $_.FullName -Tail 200 -ErrorAction SilentlyContinue
              }
          }

          $installationPath = $instance.installationPath
          $bootstrapperUrl = switch ($instance.productId) {
            'Microsoft.VisualStudio.Product.BuildTools' { 'https://aka.ms/vs/17/release/vs_buildtools.exe' }
            'Microsoft.VisualStudio.Product.Enterprise' { 'https://aka.ms/vs/17/release/vs_enterprise.exe' }
            'Microsoft.VisualStudio.Product.Professional' { 'https://aka.ms/vs/17/release/vs_professional.exe' }
            'Microsoft.VisualStudio.Product.Community' { 'https://aka.ms/vs/17/release/vs_community.exe' }
            default { throw "Unsupported Visual Studio product id: $($instance.productId)" }
          }
          $bootstrapperPath = Join-Path $env:RUNNER_TEMP 'vs-bootstrapper.exe'
          Invoke-WebRequest -Uri $bootstrapperUrl -OutFile $bootstrapperPath

          $installProcess = Start-Process -FilePath $bootstrapperPath -WorkingDirectory $env:RUNNER_TEMP -ArgumentList @(
            'modify',
            '--installPath', $installationPath,
            '--add', 'Microsoft.VisualStudio.Component.VC.ATL',
            '--add', 'Microsoft.VisualStudio.Component.VC.ATLMFC',
            '--passive',
            '--wait',
            '--norestart'
          ) -Wait -PassThru
          Remove-Item $bootstrapperPath -Force -ErrorAction SilentlyContinue
          if ($installProcess.ExitCode -notin @(0, 3010)) {
            Show-RecentInstallerLogs
            throw "Visual Studio setup failed with exit code $($installProcess.ExitCode)"
          }

          $installedAtlHeader = Get-ChildItem -Path (Join-Path $installationPath 'VC\Tools\MSVC') -Recurse -Filter atlstr.h -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installedAtlHeader) {
            Show-RecentInstallerLogs
            throw "ATL installation finished but atlstr.h was still not found under $installationPath."
          }

          Write-Host "Installed ATL at $($installedAtlHeader.FullName)"

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          compression-level: 0

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev
          version: 1.0

      - uses: subosito/flutter-action@0ca7a949e71ae44c8e688a51c5e7e93b2c87e295 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
          compression-level: 0
