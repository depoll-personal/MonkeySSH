name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'web/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'web/**'
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which platform directories changed so we can skip irrelevant builds.
  # PRs diff against the base branch; merge_group diffs against its base SHA.
  # Push events mark all platforms as changed so every build runs.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      macos: ${{ steps.filter.outputs.macos }}
      windows: ${{ steps.filter.outputs.windows }}
      linux: ${{ steps.filter.outputs.linux }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect platform changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          elif [ "$EVENT_NAME" = "merge_group" ]; then
            BASE_SHA="$MG_BASE_SHA"
          else
            # push — always build everything
            for p in android ios macos windows linux; do
              echo "$p=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          if ! changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null); then
            echo "::warning::git diff failed — building all platforms as a safety net"
            for p in android ios macos windows linux; do
              echo "$p=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          matches() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          global=$(matches '^(pubspec\.(yaml|lock)|\.github/workflows/|scripts/|assets/)')

          for platform in android ios macos windows linux; do
            platform_changed=$(matches "^${platform}/")
            if [ "$global" = "true" ] || [ "$platform_changed" = "true" ]; then
              echo "$platform=true" >> "$GITHUB_OUTPUT"
            else
              echo "$platform=false" >> "$GITHUB_OUTPUT"
            fi
          done

  # ---------------------------------------------------------------------------
  # Combined analyze + format + test — always runs. One Flutter SDK setup
  # instead of two saves ~1.5 min of runner time per CI run.
  # ---------------------------------------------------------------------------
  check:
    name: Analyze, Format & Test
    runs-on: ubicloud-standard-4
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Platform builds — conditional on detected changes.
  #
  # * PRs and merge_group: only build platforms whose native code or
  #   dependencies changed. Dart-only changes skip all builds (analyze + test
  #   is sufficient). The merge_group still runs affected platform builds so
  #   that concurrent PRs touching the same native code are validated.
  # * push (main/develop): always build everything as a safety net.
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android
    needs: [changes, check]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubicloud-standard-4
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/build.gradle*', 'android/app/build.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate CI release signing config
        run: |
          keytool -genkeypair \
            -keystore android/app/ci-release.keystore \
            -storepass ci-release \
            -keypass ci-release \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI Release,O=GitHub Actions,C=US"
          cat > android/app/key.properties << EOF
          storePassword=ci-release
          keyPassword=ci-release
          keyAlias=ci-release
          storeFile=ci-release.keystore
          EOF

      - name: Build release APK
        run: flutter build apk --flavor production --release --no-tree-shake-icons --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-production-release.apk
          compression-level: 0
          retention-days: 5

      - name: Clean up CI signing config
        if: always()
        run: rm -f android/app/key.properties android/app/ci-release.keystore

  build-ios:
    name: Build iOS
    needs: [changes, check]
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-ios-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --flavor production --release --no-codesign --no-tree-shake-icons --split-debug-info=.debug-info

      - name: Upload iOS build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-build
          path: build/ios/iphoneos/MonkeySSH.app
          compression-level: 0
          retention-days: 5

  build-macos:
    name: Build macOS
    needs: [changes, check]
    if: needs.changes.outputs.macos == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            macos/Pods
            ~/Library/Caches/CocoaPods
          key: pods-macos-${{ runner.os }}-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release --no-tree-shake-icons

      - name: Upload macOS build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/MonkeySSH.app
          compression-level: 0
          retention-days: 5

  build-windows:
    name: Build Windows
    needs: [changes, check]
    if: needs.changes.outputs.windows == 'true'
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Download Ghostty VTE prebuilt
        # Workaround for ghostty_vte 0.1.2 bug on Windows: hook's
        # _shouldPreferSourceBuild checks path for "\.pub-cache\" which
        # doesn't match Windows' "AppData\Local\Pub\Cache" pub cache path,
        # causing it to skip the prebuilt download and attempt a source
        # build that needs Ghostty's Zig source tree (not present).
        run: dart run ghostty_vte:setup

      - name: Build Windows
        run: flutter build windows --release --no-tree-shake-icons -v

      - name: Upload Windows build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          compression-level: 0
          retention-days: 5

  build-linux:
    name: Build Linux
    needs: [changes, check]
    if: needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev
          version: 1.0

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release --no-tree-shake-icons

      - name: Upload Linux build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
          compression-level: 0
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Gate job — the single required status check for branch protection.
  # Passes when check succeeds and all triggered builds pass; correctly ignores
  # builds that were skipped because the platform was unchanged.
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    if: ${{ always() && !cancelled() }}
    needs: [changes, check, build-android, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CHECK_RESULT: ${{ needs.check.result }}
          ANDROID_RESULT: ${{ needs.build-android.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
          MACOS_RESULT: ${{ needs.build-macos.result }}
          WINDOWS_RESULT: ${{ needs.build-windows.result }}
          LINUX_RESULT: ${{ needs.build-linux.result }}
        run: |
          ok=true
          for name_result in \
            "changes:$CHANGES_RESULT" \
            "check:$CHECK_RESULT" \
            "build-android:$ANDROID_RESULT" \
            "build-ios:$IOS_RESULT" \
            "build-macos:$MACOS_RESULT" \
            "build-windows:$WINDOWS_RESULT" \
            "build-linux:$LINUX_RESULT"; do
            name="${name_result%%:*}"
            result="${name_result#*:}"
            case "$result" in
              success|skipped)
                echo "✅ $name: $result"
                ;;
              *)
                echo "❌ $name: $result"
                ok=false
                ;;
            esac
          done
          if [ "$ok" = false ]; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
