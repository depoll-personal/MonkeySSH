name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'web/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - 'linux/**'
      - 'macos/**'
      - 'windows/**'
      - 'web/**'
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which platform directories changed so we can skip irrelevant builds.
  # On non-PR events (push, merge_group) every platform is marked as changed so
  # the conditional builds still respect the merge_group guard below.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      macos: ${{ steps.filter.outputs.macos }}
      windows: ${{ steps.filter.outputs.windows }}
      linux: ${{ steps.filter.outputs.linux }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: github.event_name == 'pull_request'
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect platform changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            for p in android ios macos windows linux; do
              echo "$p=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          changed=$(git diff --name-only "$PR_BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")

          matches() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          global=$(matches '^(pubspec\.(yaml|lock)|\.github/workflows/|scripts/)')

          for platform in android ios macos windows linux; do
            platform_changed=$(matches "^${platform}/")
            if [ "$global" = "true" ] || [ "$platform_changed" = "true" ]; then
              echo "$platform=true" >> "$GITHUB_OUTPUT"
            else
              echo "$platform=false" >> "$GITHUB_OUTPUT"
            fi
          done

  # ---------------------------------------------------------------------------
  # Combined analyze + format + test — always runs. One Flutter SDK setup
  # instead of two saves ~1.5 min of runner time per CI run.
  # ---------------------------------------------------------------------------
  check:
    name: Analyze, Format & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-warnings

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Platform builds — conditional on detected changes.
  #
  # * PRs: only build platforms whose native code or dependencies changed.
  #   Dart-only PRs skip all builds (analyze + test is sufficient).
  # * merge_group: skip all builds — the PR already verified them and the check
  #   job catches integration regressions in Dart code.
  # * push (main/develop): always build everything as a safety net.
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android
    needs: changes
    if: >-
      github.event_name != 'merge_group'
      && needs.changes.outputs.android == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/build.gradle*', 'android/app/build.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate CI release signing config
        run: |
          keytool -genkeypair \
            -keystore android/app/ci-release.keystore \
            -storepass ci-release \
            -keypass ci-release \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI Release,O=GitHub Actions,C=US"
          cat > android/app/key.properties << EOF
          storePassword=ci-release
          keyPassword=ci-release
          keyAlias=ci-release
          storeFile=ci-release.keystore
          EOF

      - name: Build release APK
        run: flutter build apk --flavor production --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-production-release.apk
          compression-level: 0

      - name: Clean up CI signing config
        if: always()
        run: rm -f android/app/key.properties android/app/ci-release.keystore

  build-ios:
    name: Build iOS
    needs: changes
    if: >-
      github.event_name != 'merge_group'
      && needs.changes.outputs.ios == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --flavor production --release --no-codesign --no-tree-shake-icons

      - name: Upload iOS build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ios-build
          path: build/ios/iphoneos/MonkeySSH.app
          compression-level: 0

  build-macos:
    name: Build macOS
    needs: changes
    if: >-
      github.event_name != 'merge_group'
      && needs.changes.outputs.macos == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: macos/Pods
          key: pods-macos-${{ runner.os }}-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release --no-tree-shake-icons

      - name: Upload macOS build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/MonkeySSH.app
          compression-level: 0

  build-windows:
    name: Build Windows
    needs: changes
    if: >-
      github.event_name != 'merge_group'
      && needs.changes.outputs.windows == 'true'
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --no-tree-shake-icons

      - name: Upload Windows build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          compression-level: 0

  build-linux:
    name: Build Linux
    needs: changes
    if: >-
      github.event_name != 'merge_group'
      && needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev
          version: 1.0

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release --no-tree-shake-icons

      - name: Upload Linux build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
          compression-level: 0

  # ---------------------------------------------------------------------------
  # Gate job — the single required status check for branch protection.
  # Passes when check succeeds and all triggered builds pass; correctly ignores
  # builds that were skipped because the platform was unchanged or because the
  # event was merge_group.
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    if: always()
    needs: [check, build-android, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        env:
          CHECK_RESULT: ${{ needs.check.result }}
          ANDROID_RESULT: ${{ needs.build-android.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
          MACOS_RESULT: ${{ needs.build-macos.result }}
          WINDOWS_RESULT: ${{ needs.build-windows.result }}
          LINUX_RESULT: ${{ needs.build-linux.result }}
        run: |
          ok=true
          for name_result in \
            "check:$CHECK_RESULT" \
            "build-android:$ANDROID_RESULT" \
            "build-ios:$IOS_RESULT" \
            "build-macos:$MACOS_RESULT" \
            "build-windows:$WINDOWS_RESULT" \
            "build-linux:$LINUX_RESULT"; do
            name="${name_result%%:*}"
            result="${name_result#*:}"
            case "$result" in
              success|skipped)
                echo "✅ $name: $result"
                ;;
              *)
                echo "❌ $name: $result"
                ok=false
                ;;
            esac
          done
          if [ "$ok" = false ]; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
