name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which files changed so we can keep the required CI check green while
  # still skipping expensive Flutter work for docs-only or other non-app edits.
  # PRs diff against the base branch, merge_group diffs against its base SHA,
  # and push events diff against the previous commit when available.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run_check: ${{ steps.filter.outputs.run_check }}
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      macos: ${{ steps.filter.outputs.macos }}
      windows: ${{ steps.filter.outputs.windows }}
      linux: ${{ steps.filter.outputs.linux }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect platform changes
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
          elif [ "$EVENT_NAME" = "merge_group" ]; then
            BASE_SHA="$MG_BASE_SHA"
          elif [ "$EVENT_NAME" = "push" ] &&
               [ -n "$PUSH_BEFORE_SHA" ] &&
               [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$PUSH_BEFORE_SHA"
          else
            # Fallback for first pushes or missing history — run the full suite.
            echo "run_check=true" >> "$GITHUB_OUTPUT"
            for p in android ios macos windows linux; do
              echo "$p=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          if ! changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null); then
            echo "::warning::git diff failed — building all platforms as a safety net"
            echo "run_check=true" >> "$GITHUB_OUTPUT"
            for p in android ios macos windows linux; do
              echo "$p=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          matches() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          run_check=$(matches '(\.dart$|^pubspec\.(yaml|lock)$|^analysis_options\.yaml$|^\.github/workflows/|^scripts/|^assets/|^(android|ios|macos|windows|linux|web)/)')
          echo "run_check=$run_check" >> "$GITHUB_OUTPUT"

          if [ "$run_check" != "true" ]; then
            for p in android ios macos windows linux; do
              echo "$p=false" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi

          global=$(matches '^(pubspec\.(yaml|lock)|\.github/workflows/|scripts/|assets/)')

          for platform in android ios macos windows linux; do
            platform_changed=$(matches "^${platform}/")
            if [ "$global" = "true" ] || [ "$platform_changed" = "true" ]; then
              echo "$platform=true" >> "$GITHUB_OUTPUT"
            else
              echo "$platform=false" >> "$GITHUB_OUTPUT"
            fi
          done

  # ---------------------------------------------------------------------------
  # Lightweight success path for docs-only or other non-Flutter changes.
  noop:
    name: No-op
    needs: changes
    if: needs.changes.outputs.run_check != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Skip heavy CI
        run: echo "No Flutter-relevant changes detected; CI is a no-op."

  # Formatting and analyzer checks for Flutter-relevant changes. Tests run in a
  # separate sharded matrix so the largest per-commit step can fan out.
  # ---------------------------------------------------------------------------
  check:
    name: Analyze & Format
    needs: changes
    if: needs.changes.outputs.run_check == 'true'
    runs-on: ubicloud-standard-4
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-warnings --fatal-infos --no-pub

  test:
    name: Test (Shard ${{ matrix.shard-index }}/4)
    needs: changes
    if: needs.changes.outputs.run_check == 'true'
    runs-on: ubicloud-standard-4
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard-index: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --no-pub --no-test-assets --exclude-tags needs-assets --total-shards 4 --shard-index ${{ matrix.shard-index }}

  asset-test:
    name: Test (Assets)
    needs: changes
    if: needs.changes.outputs.run_check == 'true'
    runs-on: ubicloud-standard-4
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run asset-dependent tests
        run: flutter test --no-pub --tags needs-assets test/app/app_metadata_test.dart

  # ---------------------------------------------------------------------------
  # Platform builds — conditional on detected changes.
  #
  # * PRs and merge_group: only build platforms whose native code or
  #   dependencies changed. Dart-only changes skip all builds (analyze + test
  #   is sufficient). The merge_group still runs affected platform builds so
  #   that concurrent PRs touching the same native code are validated.
  # * push (main/develop): diff against the previous commit when possible.
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android
    needs: [changes, check]
    if: needs.changes.outputs.android == 'true'
    runs-on: ubicloud-standard-4
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/build.gradle*', 'android/app/build.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate CI release signing config
        run: |
          keytool -genkeypair \
            -keystore android/app/ci-release.keystore \
            -storepass ci-release \
            -keypass ci-release \
            -alias ci-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI Release,O=GitHub Actions,C=US"
          cat > android/app/key.properties << EOF
          storePassword=ci-release
          keyPassword=ci-release
          keyAlias=ci-release
          storeFile=ci-release.keystore
          EOF

      - name: Build release APK
        run: flutter build apk --flavor production --release --no-tree-shake-icons --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: build/app/outputs/flutter-apk/app-production-release.apk
          archive: false
          retention-days: 5

      - name: Clean up CI signing config
        if: always()
        run: rm -f android/app/key.properties android/app/ci-release.keystore

  build-ios:
    name: Build iOS
    needs: [changes, check]
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-26
    env:
      # Keep release validation on the runner Xcode that includes the installed
      # iOS simulator runtime. Newer side-by-side Xcodes can drift ahead of the
      # available runtime and fail builds before Flutter starts.
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-ios-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-ios-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --flavor production --release --no-codesign --no-tree-shake-icons --split-debug-info=.debug-info

      - name: Upload iOS build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-build
          path: build/ios/iphoneos/MonkeySSH.app
          compression-level: 0
          retention-days: 5

  build-macos:
    name: Build macOS
    needs: [changes, check]
    if: needs.changes.outputs.macos == 'true'
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            macos/Pods
            ~/Library/Caches/CocoaPods
          key: pods-macos-${{ runner.os }}-${{ hashFiles('macos/Podfile.lock') }}
          restore-keys: pods-macos-${{ runner.os }}-

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release --no-tree-shake-icons

      - name: Upload macOS build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/MonkeySSH.app
          compression-level: 0
          retention-days: 5

  build-windows:
    name: Build Windows
    needs: [changes, check]
    if: needs.changes.outputs.windows == 'true'
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --no-tree-shake-icons

      - name: Upload Windows build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          compression-level: 0
          retention-days: 5

  build-linux:
    name: Build Linux
    needs: [changes, check]
    if: needs.changes.outputs.linux == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev
          version: 1.0

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release --no-tree-shake-icons

      - name: Upload Linux build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
          compression-level: 0
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Gate job — the single required status check for branch protection.
  # Passes when checks/tests succeed and all triggered builds pass; correctly ignores
  # builds that were skipped because the platform was unchanged.
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    if: ${{ always() && !cancelled() }}
    needs: [changes, check, test, asset-test, build-android, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          CHECK_RESULT: ${{ needs.check.result }}
          TEST_RESULT: ${{ needs.test.result }}
          ASSET_TEST_RESULT: ${{ needs.asset-test.result }}
          ANDROID_RESULT: ${{ needs.build-android.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
          MACOS_RESULT: ${{ needs.build-macos.result }}
          WINDOWS_RESULT: ${{ needs.build-windows.result }}
          LINUX_RESULT: ${{ needs.build-linux.result }}
        run: |
          ok=true
          for name_result in \
            "changes:$CHANGES_RESULT" \
            "check:$CHECK_RESULT" \
            "test:$TEST_RESULT" \
            "asset-test:$ASSET_TEST_RESULT" \
            "build-android:$ANDROID_RESULT" \
            "build-ios:$IOS_RESULT" \
            "build-macos:$MACOS_RESULT" \
            "build-windows:$WINDOWS_RESULT" \
            "build-linux:$LINUX_RESULT"; do
            name="${name_result%%:*}"
            result="${name_result#*:}"
            case "$result" in
              success|skipped)
                echo "✅ $name: $result"
                ;;
              *)
                echo "❌ $name: $result"
                ok=false
                ;;
            esac
          done
          if [ "$ok" = false ]; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
