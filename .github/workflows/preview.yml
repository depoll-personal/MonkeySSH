name: PR Preview

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'
      - '.github/workflows/**'
      - 'android/**'
      - 'ios/**'

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compute-version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.version.outputs.build-name }}
      build-number: ${{ steps.version.outputs.build-number }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute version
        id: version
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          # Keep new builds above historical PR-prefixed build numbers while
          # staying below Android's signed-32-bit versionCode ceiling.
          BUILD_NUMBER=$(( 200000000 + $(date +%s) ))

          echo "build-name=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android Preview
    needs: compute-version
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/build-deploy.yml
    with:
      build-name: ${{ needs.compute-version.outputs.build-name }}
      build-number: ${{ needs.compute-version.outputs.build-number }}
      flavor: private
      deploy-ios-to: none
      deploy-android-to: none
      build-ios: false
      build-android: true
    secrets: inherit

  build-ios:
    name: Build iOS Preview
    needs: compute-version
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/build-deploy.yml
    with:
      build-name: ${{ needs.compute-version.outputs.build-name }}
      build-number: ${{ needs.compute-version.outputs.build-number }}
      flavor: private
      deploy-ios-to: none
      deploy-android-to: none
      build-ios: true
      build-android: false
    secrets: inherit

  comment-android:
    name: PR Comment (Android)
    runs-on: ubuntu-latest
    needs: [compute-version, build-android]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Resolve preview status
        id: preview-status
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const statusFor = (job) => {
              if (!job || job.status !== 'completed') return '⏳ Building';
              switch (job.conclusion) {
                case 'success':
                  return '✅ Deployed';
                case 'skipped':
                  return '⏭️ Skipped';
                case 'cancelled':
                  return '⛔ Cancelled';
                default:
                  return '❌ Failed';
              }
            };
            const androidJob = jobs.find((job) =>
              job.name.startsWith('Build Android Preview / Build & Deploy Android'),
            );
            const iosJob = jobs.find((job) =>
              job.name.startsWith('Build iOS Preview / Build & Deploy iOS'),
            );
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const apkArtifact = artifacts.find((artifact) =>
              artifact.name.startsWith('android-apk-private-'),
            );
            let androidLink = `[View workflow run](${runUrl})`;
            if (androidJob && androidJob.status === 'completed') {
              if (androidJob.conclusion === 'success' && apkArtifact) {
                androidLink = `[Download APK](https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${apkArtifact.id})`;
              } else if (androidJob.conclusion === 'skipped') {
                androidLink = 'N/A (build skipped for fork PR)';
              }
            }
            core.setOutput('android-status', statusFor(androidJob));
            core.setOutput('ios-status', statusFor(iosJob));
            core.setOutput('android-link', androidLink);

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-build
          recreate: true
          message: |
            ## 📱 Preview Build

            | | Details |
            |---|---|
            | **Version** | `${{ needs.compute-version.outputs.build-name }}` (PR #${{ github.event.pull_request.number }}) |
            | **Build** | `${{ needs.compute-version.outputs.build-number }}` |
            | **Android Status** | ${{ steps.preview-status.outputs.android-status }} |
            | **iOS Status** | ${{ steps.preview-status.outputs.ios-status }} |

            ### Install
            | Platform | Link |
            |----------|------|
            | 🍎 **iOS** | Run the **Deploy PR to TestFlight** workflow manually from the Actions tab |
            | 🤖 **Android (APK)** | ${{ steps.preview-status.outputs.android-link }} |

            > Build triggered by ${{ github.event.pull_request.head.sha }}

  comment-ios:
    name: PR Comment (iOS)
    runs-on: ubuntu-latest
    needs: [compute-version, build-ios]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Resolve preview status
        id: preview-status
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const statusFor = (job) => {
              if (!job || job.status !== 'completed') return '⏳ Building';
              switch (job.conclusion) {
                case 'success':
                  return '✅ Deployed';
                case 'skipped':
                  return '⏭️ Skipped';
                case 'cancelled':
                  return '⛔ Cancelled';
                default:
                  return '❌ Failed';
              }
            };
            const androidJob = jobs.find((job) =>
              job.name.startsWith('Build Android Preview / Build & Deploy Android'),
            );
            const iosJob = jobs.find((job) =>
              job.name.startsWith('Build iOS Preview / Build & Deploy iOS'),
            );
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const apkArtifact = artifacts.find((artifact) =>
              artifact.name.startsWith('android-apk-private-'),
            );
            let androidLink = `[View workflow run](${runUrl})`;
            if (androidJob && androidJob.status === 'completed') {
              if (androidJob.conclusion === 'success' && apkArtifact) {
                androidLink = `[Download APK](https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${apkArtifact.id})`;
              } else if (androidJob.conclusion === 'skipped') {
                androidLink = 'N/A (build skipped for fork PR)';
              }
            }
            core.setOutput('android-status', statusFor(androidJob));
            core.setOutput('ios-status', statusFor(iosJob));
            core.setOutput('android-link', androidLink);

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-build
          message: |
            ## 📱 Preview Build

            | | Details |
            |---|---|
            | **Version** | `${{ needs.compute-version.outputs.build-name }}` (PR #${{ github.event.pull_request.number }}) |
            | **Build** | `${{ needs.compute-version.outputs.build-number }}` |
            | **Android Status** | ${{ steps.preview-status.outputs.android-status }} |
            | **iOS Status** | ${{ steps.preview-status.outputs.ios-status }} |

            ### Install
            | Platform | Link |
            |----------|------|
            | 🍎 **iOS** | Run the **Deploy PR to TestFlight** workflow manually from the Actions tab |
            | 🤖 **Android (APK)** | ${{ steps.preview-status.outputs.android-link }} |

            > Build triggered by ${{ github.event.pull_request.head.sha }}
