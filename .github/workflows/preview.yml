name: PR Preview

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, synchronize]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  compute-version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.version.outputs.build-name }}
      build-number: ${{ steps.version.outputs.build-number }}
      build-codename: ${{ steps.version.outputs.build-codename }}
      build-display: ${{ steps.version.outputs.build-display }}
      commits-list: ${{ steps.commits.outputs.list }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute version
        id: version
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER=$(( $(date +%s) / 10 ))
          BUILD_CODENAME=$(python3 scripts/version_codename.py "$BASE_VERSION")
          BUILD_DISPLAY="$BASE_VERSION"
          if [ -n "$BUILD_CODENAME" ]; then
            BUILD_DISPLAY="$BASE_VERSION \"$BUILD_CODENAME\""
          fi

          echo "build-name=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build-number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "build-codename=${BUILD_CODENAME}" >> "$GITHUB_OUTPUT"
          echo "build-display=${BUILD_DISPLAY}" >> "$GITHUB_OUTPUT"

      - name: List PR commits
        id: commits
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const MAX_DISPLAY = 25;
            const sanitize = (s) => s
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/@/g, '@\u200b');

            const count = ${{ github.event.pull_request.commits }};
            const lastPage = Math.max(1, Math.ceil(count / 100));
            const { data: page } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }},
              per_page: 100,
              page: lastPage,
            });
            page.reverse();
            const displayed = page.slice(0, MAX_DISPLAY);
            const lines = displayed.map(c => {
              const sha = c.sha.substring(0, 7);
              const msg = sanitize(c.commit.message.split('\n')[0]);
              return `- \`${sha}\` ${msg}`;
            });
            if (count > displayed.length) {
              lines.push(`- *... and ${count - displayed.length} more*`);
            }
            const summary = `${count} commit${count !== 1 ? 's' : ''} (newest first)`;
            const body = lines.join('\n');
            core.setOutput('list', `### Commits\n\n<details>\n<summary>${summary}</summary>\n\n${body}\n\n</details>`);

  comment-initial:
    name: PR Comment (Queued)
    runs-on: ubuntu-latest
    needs: compute-version
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3
        with:
          header: preview-build
          recreate: true
          message: |
            ## 📱 Preview Build

            | | Details |
            |---|---|
            | **Version** | `${{ needs.compute-version.outputs.build-display }}` (PR #${{ github.event.pull_request.number }}) |
            | **Build** | `${{ needs.compute-version.outputs.build-number }}` |
            | **Android Status** | ⏳ Building |
            | **iOS Status** | ⏳ Building |

            ### Install
            | Platform | Link |
            |----------|------|
            | 🍎 **iOS** | Available after a PR preview deploy |
            | 🤖 **Android (APK)** | [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### Promote
            Comment `/deploy` on this PR to deploy the current PR head to TestFlight and the Play Store internal track. The deploy workflow reuses these unsigned preview intermediates when their build number is still deployable; otherwise it rebuilds with a newer build number before uploading.

            ${{ needs.compute-version.outputs.commits-list }}

            > Build triggered by ${{ github.event.pull_request.head.sha }}
            <!-- preview-build-source-sha:${{ github.event.pull_request.head.sha }} -->
            <!-- preview-build-name:${{ needs.compute-version.outputs.build-name }} -->
            <!-- preview-build-codename:${{ needs.compute-version.outputs.build-codename }} -->
            <!-- preview-build-number:${{ needs.compute-version.outputs.build-number }} -->
            <!-- preview-build-run-id:${{ github.run_id }} -->

  build-android:
    name: Build Android Preview
    needs: compute-version
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/build-deploy.yml
    with:
      build-name: ${{ needs.compute-version.outputs.build-name }}
      build-number: ${{ needs.compute-version.outputs.build-number }}
      build-codename: ${{ needs.compute-version.outputs.build-codename }}
      pr-number: ${{ github.event.pull_request.number }}
      pr-title: ${{ github.event.pull_request.title }}
      flavor: private
      source-ref: ${{ github.event.pull_request.head.sha }}
      deploy-ios-to: none
      deploy-android-to: none
      build-ios: false
      build-android: true
      build-android-unsigned-aab: true

  build-ios:
    name: Build iOS Preview
    needs: compute-version
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/build-deploy.yml
    with:
      build-name: ${{ needs.compute-version.outputs.build-name }}
      build-number: ${{ needs.compute-version.outputs.build-number }}
      build-codename: ${{ needs.compute-version.outputs.build-codename }}
      pr-number: ${{ github.event.pull_request.number }}
      pr-title: ${{ github.event.pull_request.title }}
      flavor: private
      source-ref: ${{ github.event.pull_request.head.sha }}
      deploy-ios-to: none
      deploy-android-to: none
      build-ios: true
      build-android: false
      build-ios-unsigned-ipa: true

  comment-android:
    name: PR Comment (Android)
    runs-on: ubuntu-latest
    needs: [compute-version, build-android]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      issues: write
      actions: read
      pull-requests: write
    steps:
      - name: Resolve preview status
        id: preview-status
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const statusFor = (job) => {
              if (!job || job.status !== 'completed') return '⏳ Building';
              switch (job.conclusion) {
                case 'success':
                  return '✅ Built';
                case 'skipped':
                  return '⏭️ Skipped';
                case 'cancelled':
                  return '⛔ Cancelled';
                default:
                  return '❌ Failed';
              }
            };
            const androidJob = jobs.find((job) =>
              job.name.startsWith('Build Android Preview / Build & Deploy Android'),
            );
            const iosJob = jobs.find((job) =>
              job.name.startsWith('Build iOS Preview / Build & Deploy iOS'),
            );
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const apkArtifact = artifacts.find((artifact) =>
              artifact.name.startsWith('android-apk-private-'),
            );
            let androidLink = `[View workflow run](${runUrl})`;
            if (androidJob && androidJob.status === 'completed') {
              if (androidJob.conclusion === 'success' && apkArtifact) {
                androidLink = `[Download APK](https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${apkArtifact.id})`;
              } else if (androidJob.conclusion === 'skipped') {
                androidLink = 'N/A (build skipped for fork PR)';
              }
            }
            core.setOutput('android-status', statusFor(androidJob));
            core.setOutput('ios-status', statusFor(iosJob));
            core.setOutput('android-link', androidLink);

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3
        with:
          header: preview-build
          recreate: true
          message: |
            ## 📱 Preview Build

            | | Details |
            |---|---|
            | **Version** | `${{ needs.compute-version.outputs.build-display }}` (PR #${{ github.event.pull_request.number }}) |
            | **Build** | `${{ needs.compute-version.outputs.build-number }}` |
            | **Android Status** | ${{ steps.preview-status.outputs.android-status }} |
            | **iOS Status** | ${{ steps.preview-status.outputs.ios-status }} |

            ### Install
            | Platform | Link |
            |----------|------|
            | 🍎 **iOS** | Available after a PR preview deploy |
            | 🤖 **Android (APK)** | ${{ steps.preview-status.outputs.android-link }} |

            ### Promote
            Comment `/deploy` on this PR to deploy the current PR head to TestFlight and the Play Store internal track. The deploy workflow reuses these unsigned preview intermediates when their build number is still deployable; otherwise it rebuilds with a newer build number before uploading.

            ${{ needs.compute-version.outputs.commits-list }}

            > Build triggered by ${{ github.event.pull_request.head.sha }}
            <!-- preview-build-source-sha:${{ github.event.pull_request.head.sha }} -->
            <!-- preview-build-name:${{ needs.compute-version.outputs.build-name }} -->
            <!-- preview-build-codename:${{ needs.compute-version.outputs.build-codename }} -->
            <!-- preview-build-number:${{ needs.compute-version.outputs.build-number }} -->
            <!-- preview-build-run-id:${{ github.run_id }} -->

  comment-ios:
    name: PR Comment (iOS)
    runs-on: ubuntu-latest
    needs: [compute-version, build-ios]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      issues: write
      actions: read
      pull-requests: write
    steps:
      - name: Resolve preview status
        id: preview-status
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const statusFor = (job) => {
              if (!job || job.status !== 'completed') return '⏳ Building';
              switch (job.conclusion) {
                case 'success':
                  return '✅ Built';
                case 'skipped':
                  return '⏭️ Skipped';
                case 'cancelled':
                  return '⛔ Cancelled';
                default:
                  return '❌ Failed';
              }
            };
            const androidJob = jobs.find((job) =>
              job.name.startsWith('Build Android Preview / Build & Deploy Android'),
            );
            const iosJob = jobs.find((job) =>
              job.name.startsWith('Build iOS Preview / Build & Deploy iOS'),
            );
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });
            const apkArtifact = artifacts.find((artifact) =>
              artifact.name.startsWith('android-apk-private-'),
            );
            let androidLink = `[View workflow run](${runUrl})`;
            if (androidJob && androidJob.status === 'completed') {
              if (androidJob.conclusion === 'success' && apkArtifact) {
                androidLink = `[Download APK](https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${apkArtifact.id})`;
              } else if (androidJob.conclusion === 'skipped') {
                androidLink = 'N/A (build skipped for fork PR)';
              }
            }
            core.setOutput('android-status', statusFor(androidJob));
            core.setOutput('ios-status', statusFor(iosJob));
            core.setOutput('android-link', androidLink);

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3
        with:
          header: preview-build
          recreate: true
          message: |
            ## 📱 Preview Build

            | | Details |
            |---|---|
            | **Version** | `${{ needs.compute-version.outputs.build-display }}` (PR #${{ github.event.pull_request.number }}) |
            | **Build** | `${{ needs.compute-version.outputs.build-number }}` |
            | **Android Status** | ${{ steps.preview-status.outputs.android-status }} |
            | **iOS Status** | ${{ steps.preview-status.outputs.ios-status }} |

            ### Install
            | Platform | Link |
            |----------|------|
            | 🍎 **iOS** | Available after a PR preview deploy |
            | 🤖 **Android (APK)** | ${{ steps.preview-status.outputs.android-link }} |

            ### Promote
