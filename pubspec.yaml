name: monkeyssh
description: >
  A cross-platform SSH client built with Flutter. Features terminal emulation,
  SFTP file transfer, key management, and port forwarding. Inspired by Termius.
publish_to: 'none'

version: 0.1.1+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0
  
  # Navigation
  go_router: ^17.2.2
  
  # Database
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # SSH
  dartssh2: ^2.15.0
  
  # Terminal
  xterm: ^4.0.0
  
  # Syntax highlighting
  highlight: ^0.7.0
  
  # Secure storage
  flutter_secure_storage: ^10.0.0
  
  # Biometrics
  local_auth: ^3.0.1
  
  # File handling
  file_picker: ^11.0.2
  share_plus: ^12.0.1
  cryptography: ^2.9.0
  crypto: ^3.0.6
  pointycastle: ^4.0.0
  
  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  flutter_local_notifications: ^21.0.0
  
  # Utilities
  uuid: ^4.5.3
  intl: ^0.20.2
  collection: ^1.19.1
  equatable: ^2.0.7
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  pasteboard: ^0.5.0
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+10
  in_app_purchase_storekit: ^0.4.8+1
  quick_actions: ^1.1.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code generation
  build_runner: ^2.14.1
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.13.0
  drift_dev: ^2.31.0
  
  # Testing
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter
  
  # App icons
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/version_codenames.json
  #   - assets/icons/
  #   - assets/fonts/
